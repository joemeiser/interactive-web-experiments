<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Convergence — generative sculpture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; }
  body {
    height: 400vh; /* real scroll range */
    background:
      radial-gradient(120% 90% at 50% 0%, #1a1530 0%, #100c20 38%, #07060f 72%, #040308 100%);
    color: #e7e3f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  #c {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    display: block;
    z-index: 0;
    pointer-events: none; /* let scroll pass through */
  }
  .overlay {
    position: fixed; inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .title {
    position: absolute; top: 34px; left: 0; right: 0;
    text-align: center;
    font-weight: 300;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    font-size: clamp(13px, 2.2vw, 20px);
    opacity: 0.86;
    text-indent: 0.42em; /* offset trailing letter-spacing */
  }
  .title small {
    display: block;
    margin-top: 12px;
    font-size: 10px;
    letter-spacing: 0.34em;
    opacity: 0.45;
    text-indent: 0.34em;
  }
  .hint {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.7;
    text-indent: 0.3em;
    transition: opacity 0.6s ease;
  }
  .hint .chev {
    display: block;
    margin: 14px auto 0;
    width: 14px; height: 14px;
    border-right: 1px solid currentColor;
    border-bottom: 1px solid currentColor;
    transform: rotate(45deg);
    animation: bob 1.8s ease-in-out infinite;
    opacity: 0.8;
  }
  @keyframes bob { 0%,100%{ transform: translateY(0) rotate(45deg);} 50%{ transform: translateY(7px) rotate(45deg);} }
  body.scrolled .hint { opacity: 0; }
  #fallback {
    position: fixed; inset: 0;
    z-index: 5;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    font-size: 15px; line-height: 1.6; color: #cfc8e6;
  }
  @media (prefers-reduced-motion: reduce) { .hint .chev { animation: none; } }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="overlay">
    <div class="title">Convergence<small>scroll-driven generative sculpture</small></div>
    <div class="hint">Scroll<span class="chev"></span></div>
  </div>

  <div id="fallback">
    WebGL is unavailable in this browser, so the 3D sculpture can’t be displayed.<br />
    Try a recent version of Chrome, Firefox, Safari, or Edge with hardware acceleration enabled.
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script>
  (function () {
    "use strict";

    // ---- WebGL availability check -> visible fallback instead of blank page ----
    function webglOK() {
      try {
        var c = document.createElement("canvas");
        return !!(window.WebGLRenderingContext &&
          (c.getContext("webgl") || c.getContext("experimental-webgl")));
      } catch (e) { return false; }
    }
    if (!window.THREE || !webglOK()) {
      document.getElementById("fallback").style.display = "flex";
      document.getElementById("c").style.display = "none";
      return;
    }

    var canvas = document.getElementById("c");
    var renderer, scene, camera, group, shell, shards, dummy, clock;
    var COUNT = 700;
    var start = [], target = [], drift = [], spin = [], hue = [], phase = [];
    var progress = 0, targetProgress = 0;
    var colCool = new THREE.Color(0x3fa9d8);
    var colWarm = new THREE.Color(0xff9a3c);
    var emCool  = new THREE.Color(0x101b33);
    var emWarm  = new THREE.Color(0x331505);
    var tmpCol  = new THREE.Color();
    var tmpEm   = new THREE.Color();

    try { init(); animate(); }
    catch (err) {
      console.error(err);
      document.getElementById("fallback").style.display = "flex";
      canvas.style.display = "none";
    }

    function easeInOutCubic(x){ return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2, 3)/2; }

    function randUnit(){
      var z = Math.random()*2 - 1;
      var a = Math.random()*Math.PI*2;
      var r = Math.sqrt(1 - z*z);
      return new THREE.Vector3(r*Math.cos(a), r*Math.sin(a), z);
    }

    // Point on a (p,q) torus knot — mirrors three's internal curve formula.
    function knotPos(u, p, q, radius){
      var cu = Math.cos(u), su = Math.sin(u);
      var quOverP = (q / p) * u;
      var cs = Math.cos(quOverP);
      return new THREE.Vector3(
        radius * (2 + cs) * 0.5 * cu,
        radius * (2 + cs) * 0.5 * su,
        radius * 0.5 * Math.sin(quOverP)
      );
    }

    function buildEnvironment(){
      // Procedural soft "studio" gradient -> equirect -> PMREM, so metalness reads well
      // without loading any external HDR/image asset.
      var cv = document.createElement("canvas");
      cv.width = 8; cv.height = 256;
      var ctx = cv.getContext("2d");
      var g = ctx.createLinearGradient(0, 0, 0, 256);
      g.addColorStop(0.00, "#c9d6ff");
      g.addColorStop(0.35, "#8f7fb8");
      g.addColorStop(0.62, "#3a3050");
      g.addColorStop(1.00, "#070610");
      ctx.fillStyle = g; ctx.fillRect(0, 0, 8, 256);
      var tex = new THREE.CanvasTexture(cv);
      tex.mapping = THREE.EquirectangularReflectionMapping;
      var pmrem = new THREE.PMREMGenerator(renderer);
      pmrem.compileEquirectangularShader();
      var env = pmrem.fromEquirectangular(tex).texture;
      tex.dispose(); pmrem.dispose();
      return env;
    }

    function init(){
      renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x000000, 0); // transparent -> CSS gradient shows through

      scene = new THREE.Scene();
      scene.environment = buildEnvironment();

      camera = new THREE.PerspectiveCamera(48, window.innerWidth/window.innerHeight, 0.1, 200);
      camera.position.set(0, 0, 23);

      group = new THREE.Group();
      scene.add(group);

      // ---- lights ----
      scene.add(new THREE.AmbientLight(0x40406a, 0.55));
      var key = new THREE.DirectionalLight(0xffffff, 0.85);
      key.position.set(5, 8, 6); scene.add(key);
      var warm = new THREE.PointLight(0xff7a3c, 0.9, 120);
      warm.position.set(-14, -6, 10); scene.add(warm);
      var cool = new THREE.PointLight(0x4488ff, 0.7, 120);
      cool.position.set(14, 8, -8); scene.add(cool);

      // ---- per-shard start/target data ----
      for (var i = 0; i < COUNT; i++){
        var u = (i / COUNT) * Math.PI * 2;
        var base = knotPos(u, 2, 3, 8);
        base.add(randUnit().multiplyScalar(Math.random() * 0.55)); // tube thickness
        target.push(base);

        start.push(randUnit().multiplyScalar(16 * Math.cbrt(Math.random()))); // scattered ball
        drift.push(randUnit().multiplyScalar(1.6 + Math.random() * 2.2));
        spin.push(0.4 + Math.random() * 1.4);
        hue.push(Math.random());
        phase.push(Math.random() * Math.PI * 2);
      }

      // ---- instanced shards ----
      var geo = new THREE.IcosahedronGeometry(0.17, 0); // faceted gems
      var mat = new THREE.MeshStandardMaterial({
        metalness: 0.55, roughness: 0.32,
        emissive: emCool.clone(), emissiveIntensity: 0.35
      });
      shards = new THREE.InstancedMesh(geo, mat, COUNT);
      shards.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
      dummy = new THREE.Object3D();
      // initialise instanceColor so the attribute exists before first render
      for (var j = 0; j < COUNT; j++) shards.setColorAt(j, colCool);
      group.add(shards);

      // ---- subtle outer wireframe shell for depth ----
      shell = new THREE.Mesh(
        new THREE.IcosahedronGeometry(11, 1),
        new THREE.MeshBasicMaterial({ color: 0x6f7bd8, wireframe: true, transparent: true, opacity: 0.08 })
      );
      group.add(shell);

      clock = new THREE.Clock();

      window.addEventListener("resize", onResize, false);
      window.addEventListener("scroll", function(){
        if (window.scrollY > 4) document.body.classList.add("scrolled");
        else document.body.classList.remove("scrolled");
      }, { passive: true });
    }

    function onResize(){
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }

    function animate(){
      requestAnimationFrame(animate);
      var t = clock.getElapsedTime();

      var maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
      targetProgress = Math.min(1, Math.max(0, window.scrollY / maxScroll));
      progress += (targetProgress - progress) * 0.07; // smooth lerp, no jitter
      var e = easeInOutCubic(progress);
      var scatter = 1 - e;

      var mat = shards.material;
      mat.emissive.copy(emCool).lerp(emWarm, e);
      mat.metalness = THREE.MathUtils.lerp(0.55, 0.78, e);
      mat.roughness = THREE.MathUtils.lerp(0.45, 0.22, e);

      for (var i = 0; i < COUNT; i++){
        var s = start[i], tg = target[i], d = drift[i];
        var dx = Math.sin(t * 0.6 + phase[i]) * d.x * 0.12 * scatter;
        var dy = Math.cos(t * 0.5 + phase[i]) * d.y * 0.12 * scatter;
        var dz = Math.sin(t * 0.4 + phase[i]) * d.z * 0.12 * scatter;

        dummy.position.set(
          THREE.MathUtils.lerp(s.x, tg.x, e) + dx,
          THREE.MathUtils.lerp(s.y, tg.y, e) + dy,
          THREE.MathUtils.lerp(s.z, tg.z, e) + dz
        );
        var rot = t * spin[i];
        dummy.rotation.set(rot, rot * 0.7 + phase[i], rot * 0.3);
        var sc = THREE.MathUtils.lerp(0.5, 1.05, e) * (0.92 + 0.08 * Math.sin(t * 2 + phase[i]));
        dummy.scale.setScalar(sc);
        dummy.updateMatrix();
        shards.setMatrixAt(i, dummy.matrix);

        tmpCol.copy(colCool).lerp(colWarm, Math.min(1, e * (0.55 + 0.45 * hue[i])));
        shards.setColorAt(i, tmpCol);
      }
      shards.instanceMatrix.needsUpdate = true;
      if (shards.instanceColor) shards.instanceColor.needsUpdate = true;

      // continuous rotation tied to progress + slow idle drift
      group.rotation.y = progress * Math.PI * 2.2 + t * 0.05;
      group.rotation.x = Math.sin(progress * Math.PI) * 0.35;

      shell.rotation.y = -t * 0.06;
      shell.rotation.x = t * 0.04;
      var ss = THREE.MathUtils.lerp(1.3, 0.92, e);
      shell.scale.setScalar(ss);
      shell.material.opacity = THREE.MathUtils.lerp(0.05, 0.12, e);

      camera.position.z = THREE.MathUtils.lerp(24, 19, e);
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }
  })();
  </script>
</body>
</html>
