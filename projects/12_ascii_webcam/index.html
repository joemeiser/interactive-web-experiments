<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Webcam</title>
<style>
  :root{
    --bg:#0a0c0f; --panel:#14181d; --line:#222a32; --txt:#cdd6e0;
    --muted:#7a8794; --accent:#39ff7a; --danger:#ff5d5d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font:14px/1.4 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif}
  header{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;
    flex-wrap:wrap;gap:8px 16px;align-items:center}
  h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px}
  #status{font-size:12px;color:var(--muted)}
  #status b{color:var(--accent)}
  .privacy{font-size:11px;color:var(--muted);margin-left:auto}
  main{display:flex;flex-direction:column;height:calc(100% - 47px)}
  #stage{flex:1;min-height:0;position:relative;background:#000;overflow:hidden}
  #out{display:block;width:100%;height:100%}
  #fps{position:absolute;top:6px;left:8px;font:11px ui-monospace,monospace;
    color:var(--accent);opacity:.7;pointer-events:none}
  .controls{display:flex;flex-wrap:wrap;gap:10px 18px;padding:10px 14px;
    border-top:1px solid var(--line);background:var(--panel);align-items:center}
  .ctl{display:flex;flex-direction:column;gap:3px}
  .ctl label{font-size:11px;color:var(--muted)}
  .ctl input[type=range]{width:120px}
  select,input[type=text]{background:#0c1014;color:var(--txt);
    border:1px solid var(--line);border-radius:5px;padding:5px 7px;font-size:13px}
  input[type=text]{width:150px;font-family:ui-monospace,monospace}
  button{background:#0c1014;color:var(--txt);border:1px solid var(--line);
    border-radius:6px;padding:7px 12px;font-size:13px;cursor:pointer}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.primary{border-color:var(--accent);color:var(--accent)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
  label.chk{flex-direction:row;align-items:center;gap:6px;color:var(--txt);font-size:13px}
</style>
</head>
<body>
<header>
  <h1>ASCII Webcam</h1>
  <span id="status"></span>
  <span class="privacy">All processing happens in your browser. Nothing is uploaded.</span>
</header>

<main>
  <div id="stage">
    <canvas id="out"></canvas>
    <div id="fps"></div>
  </div>

  <div class="controls">
    <div class="row">
      <button id="btnCam" class="primary">Enable camera</button>
      <button id="btnStop" disabled>Stop camera</button>
      <button id="btnSave">Save frame as JPEG</button>
    </div>

    <div class="ctl">
      <label>Density (<span id="densVal"></span> cols)</label>
      <input id="density" type="range" min="40" max="160" value="90">
    </div>

    <div class="ctl">
      <label>Contrast (<span id="conVal"></span>)</label>
      <input id="contrast" type="range" min="0.5" max="3" step="0.1" value="1.3">
    </div>

    <div class="ctl">
      <label>Character set</label>
      <select id="charset">
        <option value="@%#*+=-:. ">Classic  @%#*+=-:.</option>
        <option value="█▓▒░ ">Blocks  █▓▒░</option>
        <option value="MWN8Xkxoc:. ">Letters  MWN8Xk…</option>
        <option value="custom">Custom…</option>
      </select>
    </div>
    <div class="ctl">
      <label>Custom (dense → sparse)</label>
      <input id="customSet" type="text" value="@#=:. " disabled>
    </div>

    <div class="ctl">
      <label>Color mode</label>
      <select id="color">
        <option value="green">Terminal green</option>
        <option value="mono">Monochrome</option>
        <option value="invert">Inverted</option>
        <option value="sampled">Sampled color</option>
      </select>
    </div>

    <label class="chk"><input id="mirror" type="checkbox" checked> Mirror</label>
  </div>
</main>

<video id="vid" playsinline muted style="display:none"></video>

<script>
(() => {
  "use strict";

  // ---- elements ----
  const out = document.getElementById('out');
  const ctx = out.getContext('2d');
  const stage = document.getElementById('stage');
  const video = document.getElementById('vid');
  const statusEl = document.getElementById('status');
  const fpsEl = document.getElementById('fps');

  const elDensity = document.getElementById('density');
  const elContrast = document.getElementById('contrast');
  const elCharset = document.getElementById('charset');
  const elCustom = document.getElementById('customSet');
  const elColor = document.getElementById('color');
  const elMirror = document.getElementById('mirror');
  const densVal = document.getElementById('densVal');
  const conVal = document.getElementById('conVal');

  const btnCam = document.getElementById('btnCam');
  const btnStop = document.getElementById('btnStop');
  const btnSave = document.getElementById('btnSave');

  // ---- offscreen sources ----
  const sample = document.createElement('canvas');           // 1px per cell
  const sctx = sample.getContext('2d', { willReadFrequently: true });
  const demo = document.createElement('canvas');             // synthetic scene
  demo.width = 480; demo.height = 360;
  const dctx = demo.getContext('2d');

  // ---- state ----
  const FONT = "ui-monospace, Menlo, Consolas, monospace";
  let mode = 'demo';          // 'demo' | 'camera'
  let stream = null;
  let cols = 0, rows = 0, charW = 0, lineH = 0, fontSize = 0;
  let cssW = 0, cssH = 0, dpr = 1;
  let needGrid = true;

  function ramp() {
    const v = elCharset.value;
    const s = v === 'custom' ? (elCustom.value || ' ') : v;
    return s.length ? s : ' ';
  }

  function setStatus(state) {
    const map = {
      demo: "Status: <b>Demo mode</b> — synthetic scene. Click <b>Enable camera</b> for the live effect.",
      live: "Status: <b>Live camera</b> — local only.",
      denied: "Status: <b>Camera denied</b> — showing demo.",
      insecure: "Status: <b>Camera unavailable here</b> (file://) — showing demo. Camera works on the live HTTPS site."
    };
    statusEl.innerHTML = map[state] || map.demo;
  }

  // ---- grid sizing (decoupled from display size) ----
  function setupGrid() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cssW = stage.clientWidth;
    cssH = stage.clientHeight;
    if (cssW < 2 || cssH < 2) return;

    out.width = Math.round(cssW * dpr);
    out.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const targetCols = +elDensity.value;
    fontSize = Math.max(4, cssW / targetCols);
    ctx.font = `${fontSize}px ${FONT}`;
    charW = ctx.measureText('M').width || fontSize * 0.6;
    lineH = fontSize;                       // classic tall ASCII cell
    cols = Math.max(1, Math.floor(cssW / charW));
    rows = Math.max(1, Math.floor(cssH / lineH));
    sample.width = cols;
    sample.height = rows;
    needGrid = false;
  }

  // object-fit: cover crop so the source isn't squished into the grid aspect
  function coverRect(sw, sh, gridAspect) {
    const srcAspect = sw / sh;
    let cw = sw, ch = sh, sx = 0, sy = 0;
    if (srcAspect > gridAspect) { cw = sh * gridAspect; sx = (sw - cw) / 2; }
    else { ch = sw / gridAspect; sy = (sh - ch) / 2; }
    return [sx, sy, cw, ch];
  }

  // ---- demo scene ----
  function drawDemo(t) {
    const W = demo.width, H = demo.height, c = dctx;
    const hue = (t * 0.02) % 360;
    const g = c.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, `hsl(${hue},70%,12%)`);
    g.addColorStop(1, `hsl(${(hue + 130) % 360},70%,42%)`);
    c.fillStyle = g; c.fillRect(0, 0, W, H);

    for (let k = 0; k < 4; k++) {
      const x = W / 2 + Math.cos(t * 0.0011 * (k + 1) + k) * W * 0.32;
      const y = H / 2 + Math.sin(t * 0.0014 * (k + 1) + k * 2) * H * 0.32;
      const rad = 55 + 40 * Math.sin(t * 0.002 + k);
      const rg = c.createRadialGradient(x, y, 0, x, y, rad);
      rg.addColorStop(0, `hsla(${(hue + k * 70) % 360},90%,72%,0.95)`);
      rg.addColorStop(1, 'hsla(0,0%,0%,0)');
      c.fillStyle = rg; c.beginPath(); c.arc(x, y, rad, 0, 7); c.fill();
    }
    c.save(); c.translate(W / 2, H / 2); c.rotate(t * 0.0009);
    c.fillStyle = 'rgba(255,255,255,0.14)';
    c.fillRect(-W * 0.42, -7, W * 0.84, 14);
    c.restore();
  }

  // ---- pipeline ----
  let last = performance.now(), fpsAcc = 0, fpsN = 0;

  function frame(t) {
    requestAnimationFrame(frame);
    if (needGrid) setupGrid();
    if (!cols) return;

    const useCam = mode === 'camera' && video.readyState >= 2 && video.videoWidth;
    let src, sw, sh;
    if (useCam) { src = video; sw = video.videoWidth; sh = video.videoHeight; }
    else { drawDemo(t); src = demo; sw = demo.width; sh = demo.height; }

    const gridAspect = (cols * charW) / (rows * lineH);
    const [sx, sy, cw, ch] = coverRect(sw, sh, gridAspect);

    sctx.save();
    sctx.clearRect(0, 0, cols, rows);
    if (elMirror.checked) { sctx.translate(cols, 0); sctx.scale(-1, 1); }
    sctx.drawImage(src, sx, sy, cw, ch, 0, 0, cols, rows);
    sctx.restore();

    const data = sctx.getImageData(0, 0, cols, rows).data;
    renderAscii(data);

    // fps
    const dt = t - last; last = t;
    fpsAcc += dt; fpsN++;
    if (fpsAcc > 500) { fpsEl.textContent = Math.round(1000 / (fpsAcc / fpsN)) + ' fps'; fpsAcc = 0; fpsN = 0; }
  }

  function renderAscii(data) {
    const r0 = ramp(), L = r0.length;
    const con = +elContrast.value;
    const cmode = elColor.value;

    let bg = '#000', fg = '#39ff7a';
    if (cmode === 'mono') fg = '#e8edf2';
    else if (cmode === 'invert') { bg = '#f2f4f6'; fg = '#0a0a0a'; }

    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, cssW, cssH);
    ctx.font = `${fontSize}px ${FONT}`;
    ctx.textBaseline = 'top';

    if (cmode !== 'sampled') {
      ctx.fillStyle = fg;
      for (let r = 0; r < rows; r++) {
        let line = '';
        const base = r * cols * 4;
        for (let c = 0; c < cols; c++) {
          const i = base + c * 4;
          let b = (0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2]) / 255;
          b = (b - 0.5) * con + 0.5;
          b = b < 0 ? 0 : b > 1 ? 1 : b;
          line += r0[(Math.floor((1 - b) * (L - 1)))];   // bright source -> dense char
        }
        ctx.fillText(line, 0, r * lineH);                // one fillText per row (fast path)
      }
    } else {
      for (let r = 0; r < rows; r++) {
        const base = r * cols * 4;
        for (let c = 0; c < cols; c++) {
          const i = base + c * 4;
          const R = data[i], G = data[i + 1], B = data[i + 2];
          let b = (0.299 * R + 0.587 * G + 0.114 * B) / 255;
          b = (b - 0.5) * con + 0.5;
          b = b < 0 ? 0 : b > 1 ? 1 : b;
          const ch = r0[Math.floor((1 - b) * (L - 1))];
          if (ch === ' ') continue;
          ctx.fillStyle = `rgb(${R},${G},${B})`;
          ctx.fillText(ch, c * charW, r * lineH);
        }
      }
    }
  }

  // ---- camera ----
  async function enableCamera() {
    if (!window.isSecureContext || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('insecure'); return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      mode = 'camera';
      btnStop.disabled = false;
      btnCam.disabled = true;
      setStatus('live');
    } catch (e) {
      setStatus(window.isSecureContext ? 'denied' : 'insecure');
    }
  }

  function stopCamera() {
    if (stream) stream.getTracks().forEach(tr => tr.stop());
    stream = null; video.srcObject = null;
    mode = 'demo';
    btnStop.disabled = true;
    btnCam.disabled = false;
    setStatus('demo');
  }

  function saveJpeg() {
    try {
      const url = out.toDataURL('image/jpeg', 0.9);
      const a = document.createElement('a');
      a.href = url; a.download = 'ascii-webcam.jpg';
      document.body.appendChild(a); a.click(); a.remove();
    } catch (e) {
      alert('Could not export this frame: ' + e.message);
    }
  }

  // ---- wiring ----
  btnCam.addEventListener('click', enableCamera);
  btnStop.addEventListener('click', stopCamera);
  btnSave.addEventListener('click', saveJpeg);
  elDensity.addEventListener('input', () => { densVal.textContent = elDensity.value; needGrid = true; });
  elContrast.addEventListener('input', () => { conVal.textContent = (+elContrast.value).toFixed(1); });
  elCharset.addEventListener('change', () => { elCustom.disabled = elCharset.value !== 'custom'; });
  new ResizeObserver(() => { needGrid = true; }).observe(stage);
  window.addEventListener('orientationchange', () => { needGrid = true; });

  densVal.textContent = elDensity.value;
  conVal.textContent = (+elContrast.value).toFixed(1);
  setStatus('demo');
  setupGrid();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
