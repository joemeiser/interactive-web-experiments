<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sunward — Summer Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
:root{
  --sky-top:#7ec8e3; --sky-low:#ffe6bd;
  --ink:#22324a; --ink-soft:#5a6b85; --line:#e7ddc9;
  --paper:#fffdf7; --paper-2:#fff7e8;
  --sun:#ff9f1c; --sun-deep:#f17105;
  --math:#ff6b5e; --math-deep:#e23d2f; --math-soft:#ffe7e3;
  --ela:#0fb5ba; --ela-deep:#0a8a8e; --ela-soft:#d9f5f5;
  --good:#2ec27e; --good-soft:#dcf5e8; --good-deep:#1e8c58;
  --warn:#f0a020; --warn-soft:#fdeecb;
  --shadow:0 10px 30px rgba(34,50,74,.14);
  --shadow-sm:0 4px 14px rgba(34,50,74,.10);
  --r:20px; --r-sm:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Nunito",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ink);
  min-height:100dvh;
  background:linear-gradient(180deg,var(--sky-top) 0%,#bfe2ee 32%,var(--sky-low) 100%) fixed;
  -webkit-text-size-adjust:100%;
}
h1,h2,h3,.display{font-family:"Fredoka",system-ui,sans-serif;font-weight:600;letter-spacing:.2px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:720px;margin:0 auto;padding:18px 18px 48px;min-height:100dvh;display:flex;flex-direction:column}

/* ---------- top brand ---------- */
.brand{display:flex;align-items:center;gap:12px;padding:6px 2px 14px}
.brand .mark{width:42px;height:42px;flex:0 0 auto;filter:drop-shadow(0 3px 6px rgba(241,113,5,.35))}
.brand .name{font-family:"Fredoka";font-weight:700;font-size:1.45rem;color:#fff;text-shadow:0 2px 8px rgba(34,50,74,.25)}
.brand .name b{color:#fff6}
.brand .tag{margin-left:auto;font-weight:700;font-size:.78rem;color:#fff;background:rgba(255,255,255,.22);padding:6px 12px;border-radius:999px;backdrop-filter:blur(4px)}

/* ---------- card ---------- */
.card{background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);padding:26px 24px;border:1px solid #fff}
.screen{flex:1;display:flex;flex-direction:column;gap:18px}
.hidden{display:none !important}

/* ---------- home ---------- */
.hero h1{font-size:2rem;margin:0 0 4px;line-height:1.1}
.hero p{margin:0;color:var(--ink-soft);font-weight:600;font-size:1.02rem}
.block-label{font-family:"Fredoka";font-weight:600;font-size:.82rem;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink-soft);margin:2px 2px 10px;display:flex;align-items:center;gap:8px}
.block-label::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--sun)}

.choices{display:grid;gap:12px}
.subj-grid{grid-template-columns:repeat(3,1fr)}
.opt{position:relative;text-align:left;background:var(--paper-2);border:2px solid var(--line);border-radius:var(--r-sm);padding:16px 16px;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease;display:flex;flex-direction:column;gap:3px}
.opt:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.opt:focus-visible{outline:3px solid var(--sun);outline-offset:2px}
.opt .ic{font-size:1.5rem;line-height:1}
.opt .t{font-family:"Fredoka";font-weight:600;font-size:1.06rem}
.opt .d{font-size:.82rem;color:var(--ink-soft);font-weight:600;line-height:1.3}
.opt[aria-pressed="true"]{border-color:var(--sun);background:#fff;box-shadow:0 0 0 4px rgba(255,159,28,.16)}
.opt[aria-pressed="true"]::after{content:"✓";position:absolute;top:10px;right:12px;font-family:"Fredoka";font-weight:700;color:var(--sun-deep)}
.opt.math[aria-pressed="true"]{border-color:var(--math);box-shadow:0 0 0 4px var(--math-soft)}
.opt.math[aria-pressed="true"]::after{color:var(--math-deep)}
.opt.ela[aria-pressed="true"]{border-color:var(--ela);box-shadow:0 0 0 4px var(--ela-soft)}
.opt.ela[aria-pressed="true"]::after{color:var(--ela-deep)}
.lvl .tier{display:inline-block;font-size:.72rem;font-weight:800;padding:2px 9px;border-radius:999px;margin-bottom:2px}
.tier.t1{background:var(--good-soft);color:var(--good-deep)}
.tier.t2{background:var(--warn-soft);color:#b56b00}
.tier.t3{background:#e8e0ff;color:#5b3fc4}

.start{margin-top:6px;width:100%;background:linear-gradient(180deg,var(--sun),var(--sun-deep));color:#fff;font-family:"Fredoka";font-weight:600;font-size:1.2rem;padding:16px;border-radius:var(--r-sm);box-shadow:0 8px 20px rgba(241,113,5,.34);transition:transform .12s ease,filter .12s ease}
.start:hover{transform:translateY(-2px);filter:brightness(1.04)}
.start:active{transform:translateY(0)}
.start:disabled{filter:grayscale(.5) opacity(.6);box-shadow:none;cursor:not-allowed;transform:none}
.fineprint{text-align:center;color:var(--ink-soft);font-size:.8rem;font-weight:600;margin-top:2px}

/* ---------- practice ---------- */
.sky{position:relative;height:96px;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:2px}
.sky svg{display:block;width:100%;height:100%}
.hud{display:flex;align-items:center;gap:10px;margin:2px 2px 12px}
.hud .back{font-family:"Fredoka";font-weight:600;font-size:.92rem;color:var(--ink-soft);background:#ffffffc4;padding:8px 14px;border-radius:999px;box-shadow:var(--shadow-sm)}
.hud .back:hover{color:var(--ink)}
.hud .meta{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-family:"Fredoka";font-weight:600;font-size:.82rem;padding:7px 13px;border-radius:999px;background:#fff;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:6px}
.pill.subj-math{color:var(--math-deep)} .pill.subj-ela{color:var(--ela-deep)}
.pill .star{color:var(--sun)}

.qcard{background:var(--paper);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid #fff;padding:24px 22px;display:flex;flex-direction:column;gap:18px}
.skilltag{font-family:"Fredoka";font-weight:600;font-size:.74rem;text-transform:uppercase;letter-spacing:1.2px;color:#fff;padding:5px 11px;border-radius:999px;align-self:flex-start}
.skilltag.math{background:var(--math)} .skilltag.ela{background:var(--ela)}
.prompt{font-size:1.32rem;font-weight:700;line-height:1.4}
.prompt .passage{font-size:1rem;font-weight:600;color:var(--ink);background:var(--paper-2);border-left:4px solid var(--sun);padding:13px 15px;border-radius:10px;margin-bottom:14px;line-height:1.55}
.prompt .passage .ptitle{font-family:"Fredoka";font-weight:600;display:block;margin-bottom:4px;color:var(--ink)}
.prompt .q{font-size:1.2rem}
.eq{font-family:"Fredoka";font-weight:600}
.under{text-decoration:underline;text-decoration-color:var(--sun);text-decoration-thickness:3px;text-underline-offset:3px}

/* fraction */
.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;line-height:1;margin:0 2px;font-family:"Fredoka"}
.frac .n{border-bottom:2.5px solid currentColor;padding:0 5px 1px}
.frac .dd{padding:1px 5px 0}

/* answers */
.answers{display:grid;gap:11px}
.answers.mc{grid-template-columns:1fr}
.answers.cmp{grid-template-columns:repeat(3,1fr)}
.choice{text-align:left;font-size:1.12rem;font-weight:700;color:var(--ink);background:var(--paper-2);border:2px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;transition:transform .1s ease,border-color .1s ease;display:flex;align-items:center;gap:12px}
.choice .key{font-family:"Fredoka";font-weight:700;width:26px;height:26px;flex:0 0 auto;border-radius:8px;background:#fff;color:var(--ink-soft);display:grid;place-items:center;font-size:.9rem;box-shadow:inset 0 0 0 2px var(--line)}
.answers.cmp .choice{justify-content:center;font-size:1.7rem;padding:18px 0}
.answers.cmp .choice .key{display:none}
.choice:hover:not(:disabled){transform:translateY(-2px);border-color:var(--sun)}
.choice:focus-visible{outline:3px solid var(--sun);outline-offset:2px}
.choice.pick{border-color:var(--sun);background:#fff;box-shadow:0 0 0 3px rgba(255,159,28,.18)}
.choice.correct{border-color:var(--good);background:var(--good-soft);color:var(--good-deep)}
.choice.correct .key{background:var(--good);color:#fff;box-shadow:none}
.choice.wrong{border-color:var(--math);background:var(--math-soft);color:var(--math-deep)}
.choice.wrong .key{background:var(--math);color:#fff;box-shadow:none}
.choice:disabled{cursor:default}

.inputrow{display:flex;gap:10px;align-items:stretch}
.inputrow input{flex:1;font-family:"Fredoka";font-weight:600;font-size:1.5rem;color:var(--ink);background:var(--paper-2);border:2px solid var(--line);border-radius:var(--r-sm);padding:12px 16px;width:100%;text-align:center}
.inputrow input:focus{outline:none;border-color:var(--sun);background:#fff;box-shadow:0 0 0 3px rgba(255,159,28,.16)}
.hint{font-size:.82rem;color:var(--ink-soft);font-weight:600;text-align:center}

.act{display:flex;gap:10px}
.btn{flex:1;font-family:"Fredoka";font-weight:600;font-size:1.12rem;padding:14px;border-radius:var(--r-sm);transition:transform .1s ease,filter .1s ease}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(180deg,var(--sun),var(--sun-deep));color:#fff;box-shadow:0 6px 16px rgba(241,113,5,.3)}
.btn-primary:hover{filter:brightness(1.04)}
.btn-primary:disabled{filter:grayscale(.5) opacity(.55);box-shadow:none;cursor:not-allowed}
.btn-ghost{background:#fff;color:var(--ink-soft);box-shadow:var(--shadow-sm)}

/* feedback */
.fb{border-radius:var(--r-sm);padding:15px 17px;font-weight:700;font-size:1.02rem;line-height:1.5;display:none;gap:10px;align-items:flex-start}
.fb.show{display:flex;animation:pop .25s ease}
.fb .fic{font-size:1.3rem;line-height:1.2}
.fb.ok{background:var(--good-soft);color:var(--good-deep)}
.fb.no{background:var(--warn-soft);color:#9a6500}
.fb .ex{display:block;font-weight:600;color:var(--ink);margin-top:3px;font-size:.96rem}
@keyframes pop{from{transform:scale(.97);opacity:0}to{transform:scale(1);opacity:1}}

/* celebrate */
.cele{text-align:center;padding:30px 22px}
.cele .big{font-size:3.2rem}
.cele h2{font-size:1.7rem;margin:8px 0 4px}
.cele p{color:var(--ink-soft);font-weight:700;margin:0 0 18px}
.cele .row{display:flex;gap:10px}

.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50}
.confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(104vh) rotate(540deg)}}

/* two-box fraction & quotient-remainder inputs */
.boxnum{font-family:"Fredoka";font-weight:600;font-size:1.6rem;color:var(--ink);background:var(--paper-2);border:2px solid var(--line);border-radius:var(--r-sm);padding:12px 10px;width:130px;text-align:center}
.boxnum:focus{outline:none;border-color:var(--sun);background:#fff;box-shadow:0 0 0 3px rgba(255,159,28,.16)}
.boxnum.wrongbox,.inputrow input.wrongbox{border-color:var(--math);background:var(--math-soft);color:var(--math-deep)}
.fracbox{display:flex;flex-direction:column;align-items:center;gap:7px;padding:8px 0}
.fbar{width:150px;height:4px;background:var(--ink);border-radius:2px}
.qr{display:flex;align-items:center;justify-content:center;gap:16px;padding:4px 0}
.qr .rlabel{font-family:"Fredoka";font-weight:700;font-size:1.5rem;color:var(--ink-soft)}

/* correct / wrong micro-animations */
@keyframes popk{0%{transform:scale(1)}40%{transform:scale(1.015)}100%{transform:scale(1)}}
@keyframes shakek{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.qcard.pop{animation:popk .36s ease}
.qcard.shake{animation:shakek .44s ease}

/* sound toggle */
.soundtoggle{margin-left:auto;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.24);backdrop-filter:blur(4px);font-size:1.1rem;line-height:1;display:grid;place-items:center;box-shadow:var(--shadow-sm);transition:transform .1s ease,background .15s ease}
.soundtoggle:hover{transform:scale(1.06);background:rgba(255,255,255,.36)}
.soundtoggle:active{transform:scale(.94)}
.soundtoggle[aria-pressed="false"]{opacity:.7;filter:grayscale(.4)}
.brand .tag{margin-left:10px}

/* visual effects layer */
.fx{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}
.fxitem{position:fixed;transform:translate(-50%,-50%);will-change:transform,opacity}
.fx .spark{font-size:1.3rem;animation:sparkfly .9s ease-out forwards}
.fx .conf{width:9px;height:13px;border-radius:2px;animation:confburst 1s ease-out forwards}
.fx .rise{font-family:"Fredoka";font-weight:700;font-size:1.35rem;color:var(--sun-deep);animation:riseup 1.05s ease-out forwards}
@keyframes sparkfly{0%{transform:translate(-50%,-50%) scale(.3);opacity:0}30%{opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1);opacity:0}}
@keyframes confburst{0%{transform:translate(-50%,-50%) rotate(0);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) rotate(var(--rot));opacity:0}}
@keyframes riseup{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}25%{opacity:1}100%{transform:translate(-50%,calc(-50% - 76px)) scale(1.15);opacity:0}}

@media (max-width:480px){
  .subj-grid{grid-template-columns:1fr}
  .prompt{font-size:1.2rem}
  .hero h1{font-size:1.7rem}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;transition-duration:.001ms !important}
  .confetti{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
      <g fill="none" stroke="#ffd166" stroke-width="3" stroke-linecap="round">
        <line x1="24" y1="3" x2="24" y2="10"/><line x1="24" y1="38" x2="24" y2="45"/>
        <line x1="3" y1="24" x2="10" y2="24"/><line x1="38" y1="24" x2="45" y2="24"/>
        <line x1="9" y1="9" x2="14" y2="14"/><line x1="34" y1="34" x2="39" y2="39"/>
        <line x1="39" y1="9" x2="34" y2="14"/><line x1="14" y1="34" x2="9" y2="39"/>
      </g>
      <circle cx="24" cy="24" r="11" fill="#ff9f1c"/>
    </svg>
    <div class="name">Sun<b>·</b>ward</div>
    <button id="soundBtn" class="soundtoggle" aria-pressed="true" title="Sound on/off" aria-label="Toggle sound">🔊</button>
    <div class="tag">Summer Skills</div>
  </div>

  <!-- ============ HOME ============ -->
  <main id="home" class="screen">
    <div class="card hero">
      <h1>Let's keep your brain bright. ☀️</h1>
      <p>Pick what you feel like working on today. Change it any time.</p>
    </div>

    <div class="card">
      <div class="block-label">Choose a subject</div>
      <div class="choices subj-grid" id="subjGrid">
        <button class="opt math" data-subj="math" aria-pressed="false">
          <span class="ic">🔢</span><span class="t">Math</span>
          <span class="d">Numbers, fractions, shapes</span>
        </button>
        <button class="opt ela" data-subj="ela" aria-pressed="false">
          <span class="ic">📖</span><span class="t">Reading</span>
          <span class="d">Words, grammar, stories</span>
        </button>
        <button class="opt" data-subj="mixed" aria-pressed="false">
          <span class="ic">🌈</span><span class="t">Mix It Up</span>
          <span class="d">A little of both</span>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="block-label">Choose a level</div>
      <div class="choices" id="lvlGrid">
        <button class="opt lvl" data-lvl="starter" aria-pressed="false">
          <span class="tier t1">Warm-Up</span>
          <span class="t">Starter</span>
          <span class="d">Friendly review of 4th grade. Build confidence.</span>
        </button>
        <button class="opt lvl" data-lvl="on" aria-pressed="false">
          <span class="tier t2">Just Right</span>
          <span class="t">On-Level</span>
          <span class="d">Solid end-of-4th-grade work.</span>
        </button>
        <button class="opt lvl" data-lvl="stretch" aria-pressed="false">
          <span class="tier t3">Reach</span>
          <span class="t">Stretch</span>
          <span class="d">A peek at 5th grade. Trickier on purpose.</span>
        </button>
      </div>
    </div>

    <button id="startBtn" class="start" disabled>Pick a subject &amp; level ↑</button>
    <p class="fineprint">10 questions makes the sun rise. 🌅</p>
  </main>

  <!-- ============ PRACTICE ============ -->
  <main id="play" class="screen hidden">
    <div class="sky" id="sky"></div>
    <div class="hud">
      <button class="back" id="backBtn">← Menu</button>
      <div class="meta">
        <span class="pill" id="subjPill"></span>
        <span class="pill"><span class="star">★</span><span id="scorePill">0</span></span>
      </div>
    </div>

    <div class="qcard" id="qcard"><!-- filled by JS --></div>
  </main>
</div>

<div class="confetti" id="confetti" aria-hidden="true"></div>
<div class="fx" id="fx" aria-hidden="true"></div>

<script>
"use strict";
/* =========================================================================
   Sunward — standalone summer practice. No build step, no dependencies.
   Content = parameterized generators. d = difficulty 1..3 (Starter/On/Stretch).
   b = boost 0..1 within the band (in-session adaptivity nudges this).
   ========================================================================= */

/* ---------- tiny helpers ---------- */
const R = (min,max)=>Math.floor(Math.random()*(max-min+1))+min;
const pick = a=>a[Math.floor(Math.random()*a.length)];
const shuffle = a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const gcd=(a,b)=>{a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;};
function reduce(n,d){const g=gcd(n,d);return [n/g,d/g];}
function frac(n,d){return `<span class="frac"><span class="n">${n}</span><span class="dd">${d}</span></span>`;}
function lcm(a,b){return a/gcd(a,b)*b;}
function ordToCmp(x,y){return x>y?'>':x<y?'<':'=';}
// from a correct numeric/string answer, build 3 plausible distractors
function withDistractors(correct, makers){
  const set=new Set([String(correct)]); const out=[];
  for(const m of makers){ const v=String(m()); if(!set.has(v)){set.add(v);out.push(v);} if(out.length>=3)break; }
  let guard=0;
  while(out.length<3 && guard++<40){ const v=String(correct+R(-9,9)||correct+1); if(!set.has(v)){set.add(v);out.push(v);} }
  const all=shuffle([String(correct),...out.slice(0,3)]);
  return {choices:all, answer:all.indexOf(String(correct))};
}
// boost -> high end of a range. lo/hi are the band ends; returns int.
const band=(b,lo,hi)=>Math.round(lo+(hi-lo)*b);

/* =========================================================================
   SOUND ENGINE — synthesized with Web Audio (no audio files; fully offline)
   ========================================================================= */
const Sound = (()=>{
  const AC = window.AudioContext || window.webkitAudioContext;
  let ctx=null, on=true;
  const N={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,
           C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,B5:987.77,C6:1046.5,E6:1318.5,G6:1568};
  function init(){ if(ctx||!AC)return; try{ctx=new AC();}catch(e){ctx=null;} }
  function resume(){ if(ctx&&ctx.state==='suspended'){ try{ctx.resume();}catch(e){} } }
  function note(freq,start,dur,type,vol,glideTo){
    if(!ctx)return;
    const t0=ctx.currentTime+start;
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type=type||'sine'; osc.frequency.setValueAtTime(freq,t0);
    if(glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo,t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol||0.18,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t0); osc.stop(t0+dur+0.03);
  }
  const correctSets=[['E5','G5','C6'],['C5','E5','G5'],['D5','F5','A5'],['G4','C5','E5'],['F5','A5','C6'],['A4','C5','E5'],['C5','G5','E6']];
  let lastC=-1;
  function correct(){
    let i; do{i=Math.floor(Math.random()*correctSets.length);}while(i===lastC&&correctSets.length>1); lastC=i;
    const seq=correctSets[i], type=Math.random()<0.5?'triangle':'sine';
    seq.forEach((n,k)=>note(N[n],k*0.075,0.2,type,0.16));
    if(Math.random()<0.55) note(N[seq[seq.length-1]]*2,seq.length*0.075,0.12,'sine',0.05);
  }
  function streak(){ ['C5','E5','G5','C6','E6','G6'].forEach((n,k)=>note(N[n],k*0.06,0.16,'triangle',0.16)); }
  function fanfare(){
    note(N.C5,0,0.18,'triangle',0.14); note(N.E5,0.16,0.18,'triangle',0.14);
    note(N.G5,0.32,0.2,'triangle',0.15); note(N.C6,0.5,0.45,'triangle',0.18);
    note(N.E5,0.5,0.45,'sine',0.07); note(N.G5,0.5,0.45,'sine',0.06);
    note(N.E6,0.62,0.3,'sine',0.05);
  }
  function play(name){
    if(!on)return; init(); if(!ctx)return; resume();
    switch(name){
      case 'select': note(330,0,0.06,'sine',0.07); break;
      case 'click':  note(240,0,0.05,'square',0.05); break;
      case 'next':   note(420,0,0.05,'sine',0.05,520); break;
      case 'wrong':  note(300,0,0.15,'sine',0.10,210); note(210,0.07,0.18,'sine',0.09,170); break;
      case 'correct':correct(); break;
      case 'streak': streak(); break;
      case 'sunrise':fanfare(); break;
    }
  }
  function setOn(v){ on=v; if(on){ init(); resume(); } }
  function isOn(){ return on; }
  return {play,setOn,isOn,resume};
})();

/* =========================================================================
   VISUAL EFFECTS — short, varied, respect reduced-motion
   ========================================================================= */
const FX = (()=>{
  const reduced = ()=> !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches);
  const EMO=['✨','⭐','🌟','💫','🎉','☀️'];
  const COLS=['#ff9f1c','#ff6b5e','#0fb5ba','#2ec27e','#ffd166','#7c4dff'];
  function layer(){ return document.getElementById('fx'); }
  function add(cls){ const el=document.createElement('div'); el.className='fxitem '+cls; layer().appendChild(el); return el; }
  function anchor(){
    const fb=document.getElementById('fb');
    const r=(fb&&fb.getBoundingClientRect)?fb.getBoundingClientRect():null;
    if(r&&r.width) return {x:r.left+r.width/2, y:r.top+r.height/2};
    return {x:(window.innerWidth||360)/2, y:(window.innerHeight||640)/2};
  }
  function sparkles(x,y,n){
    for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, d=24+Math.random()*64;
      const el=add('spark'); el.textContent=EMO[Math.floor(Math.random()*EMO.length)];
      el.style.left=x+'px'; el.style.top=y+'px';
      el.style.setProperty('--dx',(Math.cos(a)*d)+'px'); el.style.setProperty('--dy',(Math.sin(a)*d-18)+'px');
      setTimeout(()=>el.remove(),950); }
  }
  function confetti(x,y,n){
    for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, d=30+Math.random()*80;
      const el=add('conf'); el.style.background=COLS[Math.floor(Math.random()*COLS.length)];
      el.style.left=x+'px'; el.style.top=y+'px';
      el.style.setProperty('--dx',(Math.cos(a)*d)+'px'); el.style.setProperty('--dy',(Math.sin(a)*d+40)+'px');
      el.style.setProperty('--rot',(Math.random()*720-360)+'deg');
      setTimeout(()=>el.remove(),1050); }
  }
  function rise(x,y){ const el=add('rise'); el.textContent=pick(['+1 ⭐','✓','★','+1']); el.style.left=x+'px'; el.style.top=y+'px'; setTimeout(()=>el.remove(),1080); }
  function correct(streak){
    if(reduced())return;
    const {x,y}=anchor();
    if(streak>=5){ confetti(x,y,24); sparkles(x,y,10); return; }
    const kind=['sparkles','confetti','rise'][Math.floor(Math.random()*3)];
    if(kind==='sparkles')sparkles(x,y,8); else if(kind==='confetti')confetti(x,y,15); else rise(x,y);
  }
  return {correct};
})();

{id:'placeval', name:'Place Value', gen(d,b){
  if(d<3){
    const len=d===1?R(4,4):R(5,6);
    let digits=[]; for(let i=0;i<len;i++)digits.push(R(i===0?1:0,9));
    const num=Number(digits.join(''));
    const pos=R(1,len); const dig=digits[len-pos];
    const place=Math.pow(10,pos-1);
    const names={1:'ones',10:'tens',100:'hundreds',1000:'thousands',10000:'ten-thousands',100000:'hundred-thousands'};
    const val=dig*place;
    const pretty=num.toLocaleString('en-US');
    const idx=String(num).length-pos;
    const shown=String(num).split('').map((ch,i)=>i===idx?`<span class="under">${ch}</span>`:ch).join('');
    return {type:'input',inputKind:'int',
      prompt:`What is the value of the underlined digit?<br><span class="eq" style="font-size:1.5rem">${shown}</span>`,
      answer:String(val),
      explain:`The ${dig} sits in the ${names[place]} place, so it's worth ${dig} × ${place} = ${val}.`};
  }
  // stretch: decimals to thousandths (clean string values, no float errors)
  const whole=R(0,9), t=R(0,9), h=R(0,9), th=R(1,9);
  const num=`${whole}.${t}${h}${th}`;
  const places=[['tenths',t,1],['hundredths',h,2],['thousandths',th,3]];
  const choice=pick(places.filter(p=>p[1]>0));
  const placeStr=(dig,pl)=> pl===1?`0.${dig}` : pl===2?`0.0${dig}` : `0.00${dig}`;
  const correct=placeStr(choice[1],choice[2]);
  const opts=new Set([correct]);
  for(const pl of [1,2,3]) opts.add(placeStr(choice[1],pl));
  opts.add(String(choice[1]));
  const arr=shuffle([...opts]).slice(0,4);
  if(!arr.includes(correct))arr[0]=correct;
  return {type:'mc',choices:arr,answer:arr.indexOf(correct),
    prompt:`In <span class="eq">${num}</span>, what is the value of the digit in the <b>${choice[0]}</b> place?`,
    explain:`The ${choice[1]} is in the ${choice[0]} place, worth ${correct}.`};
}},

{id:'addfrac', name:'Add & Subtract Fractions', gen(d,b){
  let n1,n2,den1,den2,op;
  if(d===1){ // like denominators
    den1=den2=pick([3,4,5,6,8]); op=pick(['+','−']);
    if(op==='+'){n1=R(1,den1-2);n2=R(1,den1-1-n1+ (den1-1-n1<1?0:0)); if(n2<1)n2=1;}
    else{n1=R(2,den1-1);n2=R(1,n1-1<1?1:n1-1);}
  } else if(d===2){ den1=den2=pick([5,6,8,10,12]); op=pick(['+','−']);
    if(op==='+'){n1=R(1,den1-2);n2=R(1,Math.max(1,den1-1-n1));}
    else{n1=R(2,den1-1);n2=R(1,Math.max(1,n1-1));}
  } else { // unlike denominators
    den1=pick([2,3,4,6]); den2=pick([3,4,6,8].filter(x=>x!==den1)); op=pick(['+','−']);
    n1=R(1,den1-1); n2=R(1,den2-1);
  }
  const L=lcm(den1,den2);
  let num = op==='+' ? n1*(L/den1)+n2*(L/den2) : n1*(L/den1)-n2*(L/den2);
  if(num<0){ // ensure non-negative for subtraction
    return MATH.find(g=>g.id==='addfrac').gen(d,b);
  }
  const [rn,rd]=reduce(num,L);
  const ansStr = rd===1?String(rn):`${rn}/${rd}`;
  const work = den1===den2
    ? `Same bottom number: ${n1} ${op} ${n2} = ${num} over ${L}.`
    : `Common bottom number is ${L}: ${frac(n1,den1)}=${frac(n1*(L/den1),L)} and ${frac(n2,den2)}=${frac(n2*(L/den2),L)}.`;
  return {type:'input',inputKind:'frac',
    prompt:`${frac(n1,den1)} <span class="eq">${op}</span> ${frac(n2,den2)} <span class="eq">=</span> ?`,
    answer:ansStr,
    explain:`${work} That simplifies to ${rd===1?rn:frac(rn,rd)}.`};
}},

/* =========================================================================
   SESSION ENGINE
   ========================================================================= */
const GOAL = 10;                        // questions to make the sun rise
const LEVELMAP = {starter:1, on:2, stretch:3};

const state = {
  subject:null, level:null, base:2,
  boost:0.5,                            // adaptive within-band (0..1)
  streak:0, miss:0,
  solved:0, correct:0,                  // this "sunrise" cycle
  totalStars:0,
  lastGenId:null, lastSubj:null,
  missedQueue:[],                       // re-surface skills missed this session
  current:null, answered:false, selected:null
};

const $ = sel=>document.querySelector(sel);

/* ----- home wiring ----- */
let chosenSubj=null, chosenLvl=null;
document.querySelectorAll('#subjGrid .opt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#subjGrid .opt').forEach(b=>b.setAttribute('aria-pressed','false'));
    btn.setAttribute('aria-pressed','true'); chosenSubj=btn.dataset.subj; Sound.play('select'); refreshStart();
  });
});
document.querySelectorAll('#lvlGrid .opt').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#lvlGrid .opt').forEach(b=>b.setAttribute('aria-pressed','false'));
    btn.setAttribute('aria-pressed','true'); chosenLvl=btn.dataset.lvl; Sound.play('select'); refreshStart();
  });
});
function refreshStart(){
  const s=$('#startBtn'); const ready=chosenSubj&&chosenLvl;
  s.disabled=!ready;
  s.textContent = ready ? 'Start practicing ☀️' : 'Pick a subject & level ↑';
}
$('#startBtn').addEventListener('click',()=>{ Sound.play('click'); startSession(); });
$('#backBtn').addEventListener('click',()=>{ Sound.play('click'); $('#play').classList.add('hidden'); $('#home').classList.remove('hidden'); });

/* sound on/off toggle */
$('#soundBtn').addEventListener('click',()=>{
  const b=$('#soundBtn'); const turningOn = b.getAttribute('aria-pressed')==='false';
  Sound.setOn(turningOn);
  b.setAttribute('aria-pressed', turningOn?'true':'false');
  b.textContent = turningOn ? '🔊' : '🔇';
  if(turningOn) Sound.play('select');
});

function startSession(){
  state.subject=chosenSubj; state.level=chosenLvl; state.base=LEVELMAP[chosenLvl];
  state.boost=0.5; state.streak=0; state.miss=0; state.solved=0; state.correct=0;
  state.missedQueue=[]; state.lastGenId=null; state.lastSubj=null;
  $('#home').classList.add('hidden'); $('#play').classList.remove('hidden');
  const sp=$('#subjPill');
  const label = state.subject==='math'?'🔢 Math':state.subject==='ela'?'📖 Reading':'🌈 Mix';
  sp.className='pill '+(state.subject==='math'?'subj-math':state.subject==='ela'?'subj-ela':'');
  sp.textContent=label;
  $('#scorePill').textContent=state.totalStars;
  drawSky(0); nextQuestion();
}

/* ----- choose next generator ----- */
function poolFor(subj){
  if(subj==='math')return {list:MATH,subj:'math'};
  if(subj==='ela')return {list:ELA,subj:'ela'};
  return null;
}
function nextSubject(){
  if(state.subject!=='mixed')return state.subject;
  // interleave: alternate, but allow some randomness
  if(state.lastSubj==='math')return 'ela';
  if(state.lastSubj==='ela')return 'math';
  return pick(['math','ela']);
}
function nextQuestion(){
  state.answered=false; state.selected=null;

  // occasionally re-surface a missed skill (spaced retrieval within session)
  let genObj, subj;
  if(state.missedQueue.length && state.solved>0 && Math.random()<0.4){
    const m=state.missedQueue.shift(); genObj=m.gen; subj=m.subj;
  } else {
    subj=nextSubject();
    const p=poolFor(subj);
    let candidates=p.list.filter(g=>g.id!==state.lastGenId);
    if(!candidates.length)candidates=p.list;
    genObj=pick(candidates);
  }
  state.lastGenId=genObj.id; state.lastSubj=subj;

  // effective difficulty: base level, with adaptive boost within the band
  const prob = genObj.gen(state.base, clamp01(state.boost));
  // normalize "_fix" generators (suffix) where answer index is computed post-shuffle
  if(prob._fix){ prob.answer = prob.choices.indexOf(prob.correct); }
  prob.skill=genObj.name; prob.subj=subj; prob.genObj=genObj;
  state.current=prob;
  renderQuestion(prob);
}
const clamp01=x=>Math.max(0,Math.min(1,x));

/* ----- render ----- */
function renderQuestion(p){
  const c=$('#qcard');
  let answersHTML='';
  if(p.type==='mc'){
    answersHTML=`<div class="answers mc" id="answers">`+
      p.choices.map((ch,i)=>`<button class="choice" data-i="${i}"><span class="key">${i+1}</span><span>${ch}</span></button>`).join('')+`</div>`;
  } else if(p.type==='compare'){
    answersHTML=`<div class="answers cmp" id="answers">`+
      p.choices.map((ch,i)=>`<button class="choice" data-i="${i}" data-sym="${ch}">${ch}</button>`).join('')+`</div>`;
  } else if(p.type==='qr'){
    answersHTML=`<div class="qr"><input id="qq" class="boxnum" inputmode="numeric" autocomplete="off" placeholder="?" aria-label="quotient"><span class="rlabel">R</span><input id="rr" class="boxnum" inputmode="numeric" autocomplete="off" placeholder="?" aria-label="remainder"></div><div class="hint">Answer, then the <b>R</b>emainder (the leftover).</div>`;
  } else if(p.inputKind==='frac'){
    answersHTML=`<div class="fracbox"><input id="fnum" class="boxnum" inputmode="numeric" autocomplete="off" placeholder="top" aria-label="top number"><span class="fbar"></span><input id="fden" class="boxnum" inputmode="numeric" autocomplete="off" placeholder="bottom" aria-label="bottom number"></div><div class="hint">Type the top and bottom numbers. Whole number? Leave the bottom empty.</div>`;
  } else {
    const ik=p.inputKind==='int'?'numeric':'text';
    answersHTML=`<div class="inputrow"><input id="ans" inputmode="${ik}" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="answer"></div>`;
  }
  c.innerHTML=`
    <span class="skilltag ${p.subj}">${p.skill}</span>
    <div class="prompt">${p.prompt}</div>
    ${answersHTML}
    <div class="fb" id="fb" aria-live="polite"></div>
    <div class="act"><button class="btn btn-primary" id="primary">Check</button></div>`;

  const enterCheck=e=>{ if(e.key==='Enter'){ e.preventDefault(); onPrimary(); } };
  if(p.inputKind==='frac'){ const fn=$('#fnum'); fn.focus(); fn.addEventListener('keydown',enterCheck); $('#fden').addEventListener('keydown',enterCheck); }
  else if(p.type==='qr'){ const qq=$('#qq'); qq.focus(); qq.addEventListener('keydown',enterCheck); $('#rr').addEventListener('keydown',enterCheck); }
  else if(p.type==='input'){ const inp=$('#ans'); inp.focus(); inp.addEventListener('keydown',enterCheck); }
  else { c.querySelectorAll('.choice').forEach(btn=> btn.addEventListener('click',()=>selectChoice(btn,p))); }

  $('#primary').addEventListener('click',onPrimary);
}
function selectChoice(btn,p){
  if(state.answered)return;
  const wrap=$('#answers'); if(!wrap)return;
  wrap.querySelectorAll('.choice').forEach(b=>b.classList.remove('pick'));
  btn.classList.add('pick');
  state.selected = p.type==='compare' ? btn.dataset.sym : Number(btn.dataset.i);
  Sound.play('select');
}

/* keyboard: number keys pick a choice, Enter checks (set up once) */
window.addEventListener('keydown',e=>{
  if($('#play').classList.contains('hidden'))return;
  const p=state.current; if(!p||state.answered)return;
  if(p.type==='mc'||p.type==='compare'){
    if(e.key==='Enter'){ onPrimary(); return; }
    const n=parseInt(e.key,10);
    if(n>=1 && n<=p.choices.length){ const btn=$('#answers').querySelector('.choice[data-i="'+(n-1)+'"]'); if(btn)selectChoice(btn,p); }
  }
});

/* ----- answer checking ----- */
function parseFrac(s){
  s=String(s).trim().replace(/[\\\u2044\u00f7]/g,'/');   // accept \, ⁄, ÷ as a slash too
  if(s.includes('/')){const [a,b]=s.split('/').map(x=>parseInt(x,10)); if(!b||Number.isNaN(a))return null; return [a,b];}
  if(s==='')return null;
  const n=Number(s); if(Number.isNaN(n))return null; return [n,1];
}
function checkInput(p,raw){
  const v=String(raw).trim();
  if(v==='')return false;
  if(p.inputKind==='int')return parseInt(v,10)===parseInt(p.answer,10);
  if(p.inputKind==='decimal')return Math.abs(parseFloat(v)-parseFloat(p.answer))<1e-9;
  if(p.inputKind==='frac'){ const a=parseFrac(v), b=parseFrac(p.answer); if(!a||!b)return false; return a[0]*b[1]===b[0]*a[1]; }
  const norm=s=>s.toLowerCase().replace(/[.\s]+$/,'').replace(/\s+/g,' ').trim();
  const ans=Array.isArray(p.answer)?p.answer:[p.answer];
  return ans.some(x=>norm(x)===norm(v));
}
function currentCorrect(p){
  if(p.type==='mc'||p.type==='compare') return state.selected===p.answer;
  if(p.type==='qr'){
    const q=parseInt($('#qq').value,10); const rRaw=$('#rr').value.trim();
    const r=rRaw===''?0:parseInt(rRaw,10);
    return q===p.answer.q && r===p.answer.r;
  }
  if(p.inputKind==='frac'){
    const numRaw=$('#fnum').value.trim(), denRaw=$('#fden').value.trim();
    if(numRaw==='')return false;
    const num=parseInt(numRaw,10); const den=denRaw===''?1:parseInt(denRaw,10);
    if(Number.isNaN(num)||Number.isNaN(den)||den===0)return false;
    const ans=parseFrac(p.answer); if(!ans)return false;
    return num*ans[1]===ans[0]*den;
  }
  return checkInput(p,$('#ans').value);
}
function isEmptyAnswer(p){
  if(p.type==='mc'||p.type==='compare') return state.selected==null;
  if(p.type==='qr') return $('#qq').value.trim()==='';
  if(p.inputKind==='frac') return $('#fnum').value.trim()==='';
  return $('#ans').value.trim()==='';
}

function onPrimary(){
  const p=state.current;
  if(!state.answered){
    if(isEmptyAnswer(p)){ nudge(p.type==='mc'||p.type==='compare'?'Pick an answer first.':'Type your answer first.'); return; }
    grade(currentCorrect(p));
  } else {
    if(state.solved>=GOAL) celebrate(); else { Sound.play('next'); nextQuestion(); }
  }
}
function nudge(msg){
  const fb=$('#fb'); fb.className='fb no show'; fb.innerHTML=`<span class="fic">👆</span><span>${msg||'Pick an answer first.'}</span>`;
}

function grade(ok){
  state.answered=true;
  const p=state.current; const c=$('#qcard');
  // lock + reveal
  if(p.type==='mc'||p.type==='compare'){
    $('#answers').querySelectorAll('.choice').forEach(b=>{
      b.disabled=true; const i=Number(b.dataset.i);
      if(i===p.answer)b.classList.add('correct');
      else if((p.type==='compare'?b.dataset.sym:i)===state.selected)b.classList.add('wrong');
    });
  } else if(p.type==='qr'){
    $('#qq').disabled=true; $('#rr').disabled=true;
    if(!ok){ $('#qq').classList.add('wrongbox'); $('#rr').classList.add('wrongbox'); }
  } else if(p.inputKind==='frac'){
    $('#fnum').disabled=true; $('#fden').disabled=true;
    if(!ok){ $('#fnum').classList.add('wrongbox'); $('#fden').classList.add('wrongbox'); }
  } else {
    $('#ans').disabled=true;
    if(!ok){ const correctTxt=Array.isArray(p.answer)?p.answer[0]:p.answer; $('#ans').classList.add('wrongbox'); $('#ans').value=$('#ans').value+'  →  '+correctTxt; }
  }
  const fb=$('#fb');
  if(ok){
    state.correct++; state.totalStars++; state.streak++;
    if(state.streak>=2) state.boost=clamp01(state.boost+0.12);
    $('#scorePill').textContent=state.totalStars;
    let head, milestone=false;
    if(state.streak===3){ head='🔥 3 in a row!'; milestone=true; }
    else if(state.streak===5){ head='⚡ 5 straight — amazing!'; milestone=true; }
    else if(state.streak>=7){ head=`🌟 ${state.streak} in a row!`; milestone=true; }
    else { head=nextPraise(); }                 // varied, non-repeating praise
    const emoji = milestone ? '🎉' : pick(['🎉','🌟','✨','👏','💪','😄','🙌','⭐']);
    fb.className='fb ok show';
    fb.innerHTML=`<span class="fic">${emoji}</span><span>${head}<span class="ex">${p.explain}</span></span>`;
    c.classList.remove('shake'); void c.offsetWidth; c.classList.add('pop'); setTimeout(()=>c.classList.remove('pop'),360);
    Sound.play(milestone?'streak':'correct');
    FX.correct(state.streak);
  } else {
    state.streak=0; state.boost=clamp01(state.boost-0.2);
    fb.className='fb no show';
    fb.innerHTML=`<span class="fic">💡</span><span>${nextTry()} Here's the trick:<span class="ex">${p.explain}</span></span>`;
    state.missedQueue.push({gen:p.genObj, subj:p.subj});
    c.classList.remove('pop'); void c.offsetWidth; c.classList.add('shake'); setTimeout(()=>c.classList.remove('shake'),440);
    Sound.play('wrong');
  }
  state.solved++;
  drawSky(Math.min(state.solved,GOAL)/GOAL);

  const btn=$('#primary');
  btn.textContent = state.solved>=GOAL ? 'See your sunrise 🌅' : 'Next question →';
  btn.focus();
}

/* ----- sky / sun progress (signature element) ----- */
function drawSky(p){            // p = 0..1 progress
  const dawn=['#2a3d66','#5b6fa6','#ffd9a0'];
  const noon=['#5bb7e0','#9fd8f0','#fff3c4'];
  const mix=(a,b)=>a.map((h,i)=>blend(h,b[i],p));
  const sky=mix(dawn,noon);
  const w=600,h=140, cx=w/2, cy=h+10, r=h-18;
  const theta=Math.PI*(1-p);                 // 180deg -> 0deg
  const sx=cx+Math.cos(theta)*(w*0.42);
  const sy=cy-Math.sin(theta)*r;
  const glow=0.4+0.6*p;
  $('#sky').innerHTML=`
  <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Progress: ${Math.round(p*100)} percent">
    <defs>
      <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="${sky[0]}"/>
        <stop offset="0.6" stop-color="${sky[1]}"/>
        <stop offset="1" stop-color="${sky[2]}"/>
      </linearGradient>
      <radialGradient id="sun" cx="50%" cy="50%" r="50%">
        <stop offset="0" stop-color="#fff6cf"/>
        <stop offset="0.5" stop-color="#ffd166"/>
        <stop offset="1" stop-color="#ff9f1c"/>
      </radialGradient>
    </defs>
    <rect width="${w}" height="${h}" fill="url(#sg)"/>
    <circle cx="${sx}" cy="${sy}" r="${22+8*p}" fill="url(#sun)" opacity="${glow}"/>
    <circle cx="${sx}" cy="${sy}" r="${16+6*p}" fill="url(#sun)"/>
    <path d="M0 ${h} Q ${w*0.25} ${h-14} ${w*0.5} ${h-6} T ${w} ${h-12} V ${h} Z" fill="#ffffff" opacity="0.18"/>
    <text x="14" y="24" fill="#ffffff" opacity="0.85" font-family="Fredoka,sans-serif" font-weight="600" font-size="15">${state.correct}/${state.solved} right · ${Math.round(p*100)}% to sunrise</text>
  </svg>`;
}
function blend(h1,h2,t){
  const c1=hex(h1),c2=hex(h2);
  const r=Math.round(c1[0]+(c2[0]-c1[0])*t),g=Math.round(c1[1]+(c2[1]-c1[1])*t),b=Math.round(c1[2]+(c2[2]-c1[2])*t);
  return `rgb(${r},${g},${b})`;
}
function hex(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}

/* ----- celebration at the goal ----- */
function celebrate(){
  const pct=Math.round(state.correct/state.solved*100);
  let msg = pct>=90?'Sunshine superstar! ☀️' : pct>=70?'Bright work today! 🌤️' : 'You kept going — that\'s what counts. 💪';
  const c=$('#qcard');
  c.innerHTML=`
    <div class="cele">
      <div class="big">🌅</div>
      <h2>The sun is up!</h2>
      <p>You answered <b>${state.correct}</b> of <b>${state.solved}</b> correctly. ${msg}</p>
      <div class="row">
        <button class="btn btn-primary" id="again">Keep going ☀️</button>
        <button class="btn btn-ghost" id="switch">Change focus</button>
      </div>
    </div>`;
  confetti();
  Sound.play('sunrise');
  $('#again').addEventListener('click',()=>{
    Sound.play('click');
    state.solved=0; state.correct=0; drawSky(0); nextQuestion();
  });
  $('#switch').addEventListener('click',()=>{
    Sound.play('click');
    $('#play').classList.add('hidden'); $('#home').classList.remove('hidden');
  });
}
function confetti(){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  const box=$('#confetti'); box.innerHTML='';
  const cols=['#ff9f1c','#ff6b5e','#0fb5ba','#2ec27e','#ffd166','#7c4dff'];
  for(let i=0;i<70;i++){
    const s=document.createElement('i');
    s.style.left=Math.random()*100+'vw';
    s.style.background=pick(cols);
    s.style.animationDuration=(2.4+Math.random()*1.8)+'s';
    s.style.animationDelay=(Math.random()*0.6)+'s';
    s.style.transform=`rotate(${Math.random()*360}deg)`;
    box.appendChild(s);
  }
  setTimeout(()=>{box.innerHTML='';},4600);
}
</script>
