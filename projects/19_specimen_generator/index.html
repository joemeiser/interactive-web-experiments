<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Specimens — living procedural creatures</title>
<style>
  :root{
    --bg:#211f1d; --bg2:#171513;
    --ink:#cfc7bb; --ink-dim:#8a8278; --hair:#39342f;
    --rose:#c08c8c; --panel:rgba(20,18,16,.72);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:radial-gradient(120% 100% at 50% 38%, var(--bg) 0%, var(--bg2) 100%);
    color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden; touch-action:manipulation;
  }
  #stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
  #frame{position:relative; line-height:0;}
  canvas{
    display:block; border-radius:2px;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7);
    image-rendering:auto;
  }
  #label{
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%);
    text-align:center; pointer-events:none; user-select:none;
  }
  #label .acc{font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:var(--ink-dim);}
  #label .lat{font-style:italic; font-size:13px; color:var(--ink); margin-top:5px; letter-spacing:.01em;}

  #panel{
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
    display:flex; align-items:center; gap:14px; flex-wrap:wrap; justify-content:center;
    padding:10px 14px; background:var(--panel); backdrop-filter:blur(8px);
    border:1px solid var(--hair); border-radius:10px; max-width:min(940px,calc(100vw - 24px));
  }
  .grp{display:flex; align-items:center; gap:8px;}
  .lbl{font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-dim); white-space:nowrap;}
  button, select, input[type=text]{
    font:inherit; color:var(--ink); background:#26231f; border:1px solid var(--hair);
    border-radius:7px; padding:8px 12px; cursor:pointer;
  }
  button:hover,select:hover{border-color:#544c44}
  button:active{transform:translateY(1px)}
  button.primary{background:#322c27; border-color:#4a423a}
  button.primary:hover{border-color:var(--rose)}
  input[type=text]{width:108px; cursor:text; font-variant-numeric:tabular-nums; letter-spacing:.04em;}
  input[type=range]{
    -webkit-appearance:none; appearance:none; width:130px; height:3px; border-radius:3px;
    background:linear-gradient(90deg,#4a423a,#6a5f55); outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
    background:var(--rose); border:2px solid #1c1916; cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:15px; height:15px; border-radius:50%; background:var(--rose); border:2px solid #1c1916; cursor:pointer;
  }
  :focus-visible{outline:2px solid var(--rose); outline-offset:2px}
  #busy{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(15,13,11,.55); color:var(--ink); letter-spacing:.2em; font-size:12px; text-transform:uppercase;
  }
  @media (max-width:520px){ #label{bottom:120px} #panel{bottom:10px} input[type=range]{width:96px} }
</style>
</head>
<body>
  <div id="stage"><div id="frame"><canvas id="c"></canvas></div></div>

  <div id="label">
    <div class="acc" id="acc">SPECIMEN —</div>
    <div class="lat" id="lat"></div>
  </div>

  <div id="panel">
    <button class="primary" id="gen" title="Mint a new creature">Generate</button>
    <div class="grp">
      <span class="lbl">Seed</span>
      <input type="text" id="seed" inputmode="numeric" spellcheck="false" aria-label="Seed">
    </div>
    <div class="grp">
      <span class="lbl">Strangeness</span>
      <input type="range" id="strange" min="0" max="1" step="0.01" value="0.5" aria-label="Strangeness">
    </div>
    <div class="grp">
      <span class="lbl" id="tempoLbl">Tempo · Ambling</span>
      <input type="range" id="speed" min="0" max="1" step="0.01" value="0.5" aria-label="Tempo, sluggish to hyperactive">
    </div>
    <div class="grp">
      <span class="lbl">Tissue</span>
      <select id="pal" aria-label="Palette">
        <option value="auto">Auto</option>
        <option value="pink">Pink</option>
        <option value="ochre">Ochre</option>
        <option value="grey">Grey</option>
        <option value="bruise">Bruise</option>
        <option value="pallid">Pallid</option>
      </select>
    </div>
    <button id="dl" title="Export high-resolution JPEG">Download</button>
  </div>

  <div id="busy">developing plate…</div>

<script>
// ============================================================================
// Alien Creature Generator — shared core. Pure pixel math (no canvas drawing
// primitives), so output is byte-identical in Node (PNG test) and the browser.
// render(W, H, seed, opts) -> { out: Uint8ClampedArray(W*H*4), spec }
// ============================================================================
(function (global) {
  'use strict';

  // ---- PRNG (mulberry32) --------------------------------------------------
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // ---- value noise --------------------------------------------------------
  function makeNoise(seed) {
    const r = mulberry32((seed ^ 0x9e3779b9) >>> 0);
    const p = new Uint8Array(256);
    for (let i = 0; i < 256; i++) p[i] = i;
    for (let i = 255; i > 0; i--) {
      const j = (r() * (i + 1)) | 0;
      const t = p[i]; p[i] = p[j]; p[j] = t;
    }
    const perm = new Uint8Array(512);
    for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
    const hash = (x, y) => perm[(perm[x & 255] + (y & 255)) & 511] / 255;
    const sm = (t) => t * t * (3 - 2 * t);
    function noise2(x, y) {
      const xi = Math.floor(x), yi = Math.floor(y);
      const xf = x - xi, yf = y - yi, u = sm(xf), v = sm(yf);
      const a = hash(xi, yi), b = hash(xi + 1, yi);
      const c = hash(xi, yi + 1), d = hash(xi + 1, yi + 1);
      return (a * (1 - u) + b * u) * (1 - v) + (c * (1 - u) + d * u) * v;
    }
    function fbm(x, y, oct, lac, gain) {
      let f = 0, amp = 0.5, sum = 0;
      for (let i = 0; i < oct; i++) { f += amp * noise2(x, y); sum += amp; amp *= gain; x *= lac; y *= lac; }
      return f / sum;
    }
    return { noise2, fbm };
  }

  // ---- helpers ------------------------------------------------------------
  const clamp = (v, a, b) => (v < a ? a : v > b ? b : v);
  const mix = (a, b, t) => a + (b - a) * t;
  const smoothstep = (e0, e1, x) => { const t = clamp((x - e0) / (e1 - e0 || 1e-6), 0, 1); return t * t * (3 - 2 * t); };

  function hsl2rgb(h, s, l) {
    h = ((h % 360) + 360) % 360;
    const c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = l - c / 2;
    let r = 0, g = 0, b = 0;
    if (h < 60) { r = c; g = x; } else if (h < 120) { r = x; g = c; }
    else if (h < 180) { g = c; b = x; } else if (h < 240) { g = x; b = c; }
    else if (h < 300) { r = x; b = c; } else { r = c; b = x; }
    return [r + m, g + m, b + m];
  }

  // ---- palette ------------------------------------------------------------
  function makePalette(rng, strangeness, forced) {
    const families = [
      { name: 'pink',   h: [350, 376], s: [0.20, 0.33], l: [0.58, 0.69] },
      { name: 'ochre',  h: [25, 41],   s: [0.22, 0.35], l: [0.51, 0.63] },
      { name: 'grey',   h: [18, 40],   s: [0.05, 0.12], l: [0.50, 0.62] },
      { name: 'bruise', h: [298, 342], s: [0.16, 0.29], l: [0.46, 0.58] },
      { name: 'pallid', h: [8, 28],    s: [0.09, 0.17], l: [0.63, 0.74] },
    ];
    let fam = (forced && forced !== 'auto') ? (families.find(f => f.name === forced) || families[0])
                                            : families[(rng() * families.length) | 0];
    const h = mix(fam.h[0], fam.h[1], rng());
    const s = mix(fam.s[0], fam.s[1], rng());
    const l = mix(fam.l[0], fam.l[1], rng());
    const base = hsl2rgb(h, s, l);

    const bruiseAmt = mix(0.08, 0.4, strangeness) * (0.6 + 0.7 * rng());
    // bruise stays on the warm purple/magenta side of the base, never cold blue
    const bruiseHue = h - mix(12, 50, rng());
    const shadow = hsl2rgb(bruiseHue, clamp(s + 0.12, 0, 0.5),
      clamp(l - mix(0.24, 0.34, 0.4 + 0.6 * strangeness), 0.07, 0.5));
    const shadowCol = [
      mix(base[0] * 0.40, shadow[0], bruiseAmt),
      mix(base[1] * 0.40, shadow[1], bruiseAmt),
      mix(base[2] * 0.40, shadow[2], bruiseAmt),
    ];
    const sssHue = mix(355, 22, rng());
    const sss = hsl2rgb(sssHue, mix(0.45, 0.7, rng()), mix(0.45, 0.55, rng()));
    const veinHue = rng() < 0.72 ? mix(290, 330, rng()) : mix(196, 214, rng());
    const vein = hsl2rgb(veinHue, mix(0.16, 0.30, rng()), mix(0.30, 0.42, rng()));
    return { base, shadowCol, sss, vein, family: fam.name };
  }

  // ---- spec ---------------------------------------------------------------
  function makeSpec(seed, strangeness, palChoice) {
    const rng = mulberry32(seed >>> 0);
    const asym = mix(0.12, 1.0, strangeness);
    const balls = [];

    const lean = (rng() - 0.5) * 0.5 * asym;
    const coreCount = 2 + ((rng() * 2) | 0);
    let topY = 0, bottomBall = null, headAnchorIdx = 0;
    const bodyR = mix(0.9, 1.15, rng());
    for (let i = 0; i < coreCount; i++) {
      const t = i / Math.max(1, coreCount - 1);
      const y = mix(-0.7, 0.95, t);
      const r = bodyR * mix(0.95, 1.18, 1 - Math.abs(t - 0.45) * 1.3) * mix(0.85, 1.05, rng());
      const x = lean * y + (rng() - 0.5) * 0.18 * asym;
      balls.push({ x, y, r, strength: 1.0, kind: 'core' });
      if (i === 0) { topY = y - r; }
      if (i === coreCount - 1) bottomBall = balls[balls.length - 1];
    }

    const headSide = rng() < 0.5 ? -1 : 1;
    const headX = lean * topY + headSide * mix(0.05, 0.5, asym) * rng();
    const headY = topY + mix(0.05, 0.32, rng());
    const headR = mix(0.5, 0.78, rng());
    const head = { x: headX, y: headY, r: headR, strength: 1.0, kind: 'head' };
    balls.push(head);
    if (rng() < 0.35 + 0.4 * strangeness) {
      balls.push({ x: headX + (rng() - 0.5) * 0.5 * (0.4 + asym), y: headY - mix(0.05, 0.4, rng()),
        r: headR * mix(0.35, 0.7, rng()), strength: 0.95, kind: 'lump' });
    }

    const limbCount = 2 + ((rng() * (1 + 4 * strangeness)) | 0);
    for (let li = 0; li < limbCount; li++) {
      const fromTop = rng() < 0.3;
      const side = rng() < 0.5 ? -1 : 1;
      const anchor = fromTop ? head : (bottomBall || balls[0]);
      let ax = anchor.x + side * anchor.r * mix(0.45, 0.9, rng());
      let ay = anchor.y + (fromTop ? -0.05 : 0.25) + (rng() - 0.5) * 0.3;
      const seg = 2 + ((rng() * 3) | 0);
      let r = anchor.r * mix(0.30, 0.48, rng());
      let dirX = side * mix(0.2, 0.8, rng());
      let dirY = mix(0.25, 0.85, rng());
      const curl = (rng() - 0.5) * 0.6 * (0.5 + asym);
      let tip = { x: ax, y: ay, r };
      for (let s = 0; s < seg; s++) {
        balls.push({ x: ax, y: ay, r, strength: 0.9, kind: 'limb' });
        tip = { x: ax, y: ay, r };
        const step = r * mix(1.3, 1.9, rng());
        dirX += curl * 0.4; dirY += 0.12;
        const len = Math.hypot(dirX, dirY) || 1;
        ax += (dirX / len) * step; ay += (dirY / len) * step;
        r *= mix(0.66, 0.82, rng());
      }
      const digitCount = (rng() < 0.6) ? 2 + ((rng() * (2 + 3 * strangeness)) | 0) : 0;
      for (let d = 0; d < digitCount; d++) {
        const a = (d / Math.max(1, digitCount)) * 1.4;
        const dr = tip.r * mix(0.4, 0.72, rng());
        balls.push({ x: tip.x + Math.cos(a + 1.1) * tip.r * 1.1 + (rng() - 0.5) * 0.04,
          y: tip.y + Math.abs(Math.sin(a)) * tip.r + dr * 0.6, r: dr, strength: 0.82, kind: 'digit' });
      }
    }

    const growths = ((rng() * (1 + 6 * strangeness)) | 0);
    for (let gx = 0; gx < growths; gx++) {
      const host = balls[(rng() * coreCount) | 0];
      const a = rng() * Math.PI * 2;
      balls.push({ x: host.x + Math.cos(a) * host.r * mix(0.5, 0.95, rng()),
        y: host.y + Math.sin(a) * host.r * mix(0.5, 0.95, rng()),
        r: host.r * mix(0.16, 0.4, rng()), strength: 0.88, kind: 'growth' });
    }

    // eyes
    const eyes = [];
    let eyeCount; const er = rng();
    if (er < 0.12) eyeCount = 0; else if (er < 0.45) eyeCount = 1;
    else if (er < 0.78) eyeCount = 2; else if (er < 0.93) eyeCount = 3; else eyeCount = 4;
    for (let e = 0; e < eyeCount; e++) {
      const scatter = mix(0.12, 0.7, strangeness);
      const offDir = (e % 2 === 0 ? 1 : -1) * (rng() < 0.5 ? 1 : -1);
      eyes.push({
        x: head.x + offDir * head.r * mix(0.25, 0.6, rng()) + (rng() - 0.5) * head.r * scatter * 1.6,
        y: head.y + (rng() - 0.5) * head.r * (0.6 + scatter * 1.3),
        r: head.r * mix(0.09, 0.16, rng()),
        openness: mix(0.32, 0.82, rng()),
        glance: (rng() - 0.5) * 0.7, glanceY: mix(0.05, 0.5, rng()),
      });
    }

    // orifices
    const orifices = [];
    const oCount = (rng() < 0.7 ? 1 : 0) + ((rng() * (1 + 2 * strangeness)) | 0);
    for (let o = 0; o < oCount; o++) {
      const onHead = rng() < 0.6;
      const host = onHead ? head : balls[(rng() * coreCount) | 0];
      orifices.push({ x: host.x + (rng() - 0.5) * host.r * (0.4 + asym),
        y: host.y + (onHead ? mix(0.15, 0.5, rng()) * host.r : (rng() - 0.5) * host.r),
        rx: host.r * mix(0.12, 0.3, rng()), ry: host.r * mix(0.05, 0.16, rng()),
        rot: (rng() - 0.5) * 1.2 });
    }

    // hair
    const hairPatches = [];
    const hpCount = (rng() * (1 + 3 * (0.4 + 0.6 * strangeness))) | 0;
    for (let p = 0; p < hpCount; p++) {
      const host = balls[(rng() * balls.length) | 0];
      hairPatches.push({ x: host.x + (rng() - 0.5) * host.r, y: host.y + (rng() - 0.5) * host.r,
        r: host.r * mix(0.4, 1.0, rng()), density: mix(0.3, 1.0, rng()), len: mix(0.05, 0.14, rng()),
        seed: (rng() * 1e6) | 0 });
    }

    const skin = {
      poreScale: mix(9, 16, rng()), poreAmt: mix(0.01, 0.022, rng()),
      wrinkleScale: mix(3.5, 6, rng()), wrinkleAmt: mix(0.03, 0.07, rng()) * (0.6 + strangeness),
      foldScale: mix(1.6, 3.0, rng()), foldAmt: mix(0.05, 0.11, rng()),
      noiseSeed: (rng() * 1e6) | 0,
    };
    const palette = makePalette(rng, strangeness, palChoice);

    const lightSide = headSide * -0.4 + (rng() - 0.5) * 0.4;
    let lx = lightSide, ly = -0.6, lz = 0.8; const ln = Math.hypot(lx, ly, lz);
    const light = [lx / ln, ly / ln, lz / ln];

    let minX = 1e9, maxX = -1e9, minY = 1e9, maxY = -1e9;
    for (const b of balls) {
      if (!isFinite(b.x) || !isFinite(b.y) || !isFinite(b.r) || b.r <= 0) continue;
      minX = Math.min(minX, b.x - b.r); maxX = Math.max(maxX, b.x + b.r);
      minY = Math.min(minY, b.y - b.r); maxY = Math.max(maxY, b.y + b.r);
    }
    if (!isFinite(minX) || maxX <= minX || maxY <= minY) {
      balls.length = 0; balls.push({ x: 0, y: 0, r: 1, strength: 1, kind: 'core' });
      minX = -1; maxX = 1; minY = -1; maxY = 1;
    }
    return { seed, strangeness, balls, eyes, orifices, hairPatches, skin, palette, light,
      head, bbox: { minX, maxX, minY, maxY } };
  }

  // ---- box blur on Float32 grid ------------------------------------------
  function boxBlur(src, dst, W, H, r, horizontal) {
    const norm = 1 / (2 * r + 1);
    if (horizontal) {
      for (let y = 0; y < H; y++) {
        let acc = 0; const row = y * W;
        for (let i = -r; i <= r; i++) acc += src[row + clamp(i, 0, W - 1)];
        for (let x = 0; x < W; x++) {
          dst[row + x] = acc * norm;
          acc += src[row + clamp(x + r + 1, 0, W - 1)] - src[row + clamp(x - r, 0, W - 1)];
        }
      }
    } else {
      for (let x = 0; x < W; x++) {
        let acc = 0;
        for (let i = -r; i <= r; i++) acc += src[clamp(i, 0, H - 1) * W + x];
        for (let y = 0; y < H; y++) {
          dst[y * W + x] = acc * norm;
          acc += src[clamp(y + r + 1, 0, H - 1) * W + x] - src[clamp(y - r, 0, H - 1) * W + x];
        }
      }
    }
  }

  // ---- main render --------------------------------------------------------
  function render(W, H, seed, opts) {
    opts = opts || {};
    const strangeness = opts.strangeness == null ? 0.5 : clamp(opts.strangeness, 0, 1);
    const transparent = !!opts.transparent;          // alpha-cut creature, no baked gallery bg
    const skipEyes = opts.skipEyes != null ? !!opts.skipEyes : transparent; // live eyes for the rig
    const spec = makeSpec(seed >>> 0, strangeness, opts.palette || 'auto');
    const out = new Uint8ClampedArray(W * H * 4);
    const { balls, bbox, palette, light, skin } = spec;
    const noise = makeNoise(skin.noiseSeed);

    const bw = Math.max(1e-3, bbox.maxX - bbox.minX), bh = Math.max(1e-3, bbox.maxY - bbox.minY);
    const scale = Math.min((W * 0.62) / bw, (H * 0.66) / bh);
    const bcx = (bbox.minX + bbox.maxX) / 2, bcy = (bbox.minY + bbox.maxY) / 2;
    const ox = W / 2 - bcx * scale, oy = H * 0.52 - bcy * scale;
    const toWX = (px) => (px - ox) / scale, toWY = (py) => (py - oy) / scale;
    const groundY = oy + bbox.maxY * scale;

    // PASS A: field. Influence radius R = 1.85*r (wide) so neighbouring masses
    // blend into one grown silhouette. Surface sits ~r at threshold T.
    const F = new Float32Array(W * H);
    const INFL = 1.85;
    for (let i = 0; i < balls.length; i++) {
      const b = balls[i];
      const sx = ox + b.x * scale, sy = oy + b.y * scale, sr = b.r * scale;
      if (sr <= 0) continue;
      const R = sr * INFL, R2 = R * R, st = b.strength;
      const x0 = Math.max(0, Math.floor(sx - R)), x1 = Math.min(W - 1, Math.ceil(sx + R));
      const y0 = Math.max(0, Math.floor(sy - R)), y1 = Math.min(H - 1, Math.ceil(sy + R));
      for (let y = y0; y <= y1; y++) {
        const dy = y - sy, dy2 = dy * dy, row = y * W;
        for (let x = x0; x <= x1; x++) {
          const dx = x - sx, d2 = (dx * dx + dy2) / R2;
          if (d2 < 1) { const c = 1 - d2; F[row + x] += st * c * c; }
        }
      }
    }
    const T = 0.5;

    // orifice recess applied into the field (carve) — softens & darkens later via AO
    for (const orf of spec.orifices) {
      const sx = ox + orf.x * scale, sy = oy + orf.y * scale;
      const rx = Math.max(2, orf.rx * scale), ry = Math.max(1.5, orf.ry * scale);
      const ca = Math.cos(orf.rot), sa = Math.sin(orf.rot);
      const rr = Math.ceil(Math.max(rx, ry)) + 2;
      const x0 = Math.max(0, (sx - rr) | 0), x1 = Math.min(W - 1, (sx + rr) | 0);
      const y0 = Math.max(0, (sy - rr) | 0), y1 = Math.min(H - 1, (sy + rr) | 0);
      for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) {
        const dx = x - sx, dy = y - sy;
        const u = (dx * ca + dy * sa) / rx, v = (-dx * sa + dy * ca) / ry;
        const d = u * u + v * v;
        if (d < 1) F[y * W + x] *= mix(0.25, 1, smoothstep(0, 1, d));
      }
    }

    // extra feature recesses (mouth, eye sockets) — real concavity baked into
    // the field so lighting, AO and the silhouette genuinely dip there
    if (opts.carve) for (let ci = 0; ci < opts.carve.length; ci++) {
      const c = opts.carve[ci];
      const sx = ox + c.x * scale, sy = oy + c.y * scale;
      const rx = Math.max(2, c.rx * scale), ry = Math.max(1.5, c.ry * scale);
      const ca = Math.cos(c.rot || 0), sa = Math.sin(c.rot || 0);

  function drawNose(ctx, rig, n, p) {

    var flare = 1 + p.sniff * 0.4;

      g.addColorStop(0, rgba(lift(rig.skin, 0.22), 1));

      ctx.fillStyle = rgba(shade(rig.skinDk, 0.85), 0.5);

<script>
(function(){
  'use strict';
  var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  var elSeed=document.getElementById('seed'), elStrange=document.getElementById('strange'),
      elPal=document.getElementById('pal'), elAcc=document.getElementById('acc'),
      elLat=document.getElementById('lat'), busy=document.getElementById('busy');

  var WORK=820, DRAG=440, EXPORT=2000;
  var state={ seed: randSeed(), strangeness:0.5, palette:'auto', speed:0.5 };
  var scene=null, raf=null, animT=0, lastNow=performance.now(), running=true;
  var reduce = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches);

  function randSeed(){ return (Math.random()*4294967296)>>>0; }

  function speciesName(seed){
    var A=['Mollis','Gravis','Tener','Pallida','Lacrima','Tumida','Vellus','Caro','Umbra','Mater','Senex','Infans','Nuda','Sopor'];
    var B=['piccininii','vulnerata','dormiens','anhelans','plicata','sine oculis','lutea','rosea','livida','cinerea','monstruosa','filialis'];
    var r=AlienCore.mulberry32(seed);
    return A[(r()*A.length)|0]+' '+B[(r()*B.length)|0];
  }

  function fitDisplay(){
    var pad=24;
    var avail=Math.min(window.innerWidth-pad*2, window.innerHeight-180);
    avail=Math.max(240, Math.min(avail, 900));
    canvas.style.width=avail+'px'; canvas.style.height=avail+'px';
  }

  // bake the expensive flesh ONCE; everything after is cheap per-frame compositing
  function buildScene(size){
    var opt={strangeness:state.strangeness, palette:state.palette, transparent:true};
    var res0=AlienCore.render(size,size,state.seed,opt);   // pass 1: silhouette for placement
    var rig=AlienRig.build(res0);
    opt.carve=rig.carves;
    var res=AlienCore.render(size,size,state.seed,opt);    // pass 2: real carved recesses
    var body=document.createElement('canvas'); body.width=size; body.height=size;
    var bctx=body.getContext('2d');
    var img=bctx.createImageData(size,size); img.data.set(res.out); bctx.putImageData(img,0,0);
    var bg=document.createElement('canvas'); bg.width=size; bg.height=size;
    AlienRig.drawBackground(bg.getContext('2d'), size, size);
    if(canvas.width!==size){ canvas.width=size; canvas.height=size; }
    scene={ body:body, bg:bg, rig:rig, size:size, noiseCache:{} };
  }

  function drawFrame(now){
    raf=requestAnimationFrame(drawFrame);   // reschedule FIRST so a bad frame can't kill the loop
    if(!running || !scene){ lastNow=now; return; }
    try{
      var dt=(now-lastNow)/1000; lastNow=now;
      if(dt<0||dt>0.25) dt=0.016;            // guard against tab-switch gaps / first frame
      animT += dt * state.speed;             // virtual time: speed scales rate without phase jumps
      var p=AlienRig.pose(scene.rig, animT);
      // re-bake the mouth recess only when its openness actually changes
      if(scene.rig.mouthCarve && scene.rig.mouthRect){
        var open=p.mouthOpen;
        if(!scene.mp || Math.abs(open-scene.lastOpen)>0.012){
          var mc=AlienRig.mouthCarveAt(scene.rig, open), r=scene.rig.mouthRect;
          var reg=AlienCore.renderRegion(scene.size, scene.size, state.seed,
            {strangeness:state.strangeness, palette:state.palette, transparent:true, carve:[mc], noiseCache:scene.noiseCache},
            r.x0, r.y0, r.w, r.h);
          if(!scene.mp) scene.mp=document.createElement('canvas');
          scene.mp.width=reg.w; scene.mp.height=reg.h;
          var pc=scene.mp.getContext('2d'); var pim=pc.createImageData(reg.w,reg.h);
          pim.data.set(reg.out); pc.putImageData(pim,0,0);
          scene.lastOpen=open;
        }
      }
      ctx.clearRect(0,0,scene.size,scene.size);
      ctx.drawImage(scene.bg,0,0);
      AlienRig.drawShadow(ctx, scene.rig, p);
      AlienRig.draw(ctx, scene.rig, scene.body, p, scene.mp);
    }catch(e){ if(!drawFrame._warned){ drawFrame._warned=1; console.error('frame error',e); } }
  }
  function start(){ running=true; lastNow=performance.now(); cancelAnimationFrame(raf); raf=requestAnimationFrame(drawFrame); }

  function refreshLabel(){
    elAcc.textContent='SPECIMEN №\u2009'+String(state.seed).padStart(10,'0');
    elLat.textContent=speciesName(state.seed);
    elSeed.value=String(state.seed);
  }
  function regen(size){ fitDisplay(); buildScene(size||WORK); refreshLabel(); start(); }

  // a settled, open-eyed portrait pose for stills
  function portraitPose(rig){
    var p=AlienRig.pose(rig, 1.4);
    p.blink=0; p.blinks=null; p.droop=Math.min(p.droop,0.16);
    p.gazeX=-0.22; p.gazeY=0.12;
    p.mouthOpen=Math.max(p.mouthOpen,0.45);
    p.bobY*=0.25; p.sway*=0.4; p.jitterX=0;
    return p;
  }

  // export at high resolution (rendered fresh, not a screenshot)
  function download(){
    busy.style.display='flex';
    setTimeout(function(){
      try{
        var opt={strangeness:state.strangeness, palette:state.palette, transparent:true};
        var res0=AlienCore.render(EXPORT,EXPORT,state.seed,opt);
        var rig=AlienRig.build(res0); opt.carve=rig.carves;
        var res=AlienCore.render(EXPORT,EXPORT,state.seed,opt);
        var off=document.createElement('canvas'); off.width=EXPORT; off.height=EXPORT;
        var octx=off.getContext('2d');
        var body=document.createElement('canvas'); body.width=EXPORT; body.height=EXPORT;
        var bctx=body.getContext('2d');
        var img=bctx.createImageData(EXPORT,EXPORT); img.data.set(res.out); bctx.putImageData(img,0,0);
        AlienRig.drawBackground(octx, EXPORT, EXPORT);
        var p=portraitPose(rig);
        var mp=null;
        if(rig.mouthCarve && rig.mouthRect){
          var mc=AlienRig.mouthCarveAt(rig, p.mouthOpen), r=rig.mouthRect;
          var reg=AlienCore.renderRegion(EXPORT,EXPORT,state.seed,
            {strangeness:state.strangeness, palette:state.palette, transparent:true, carve:[mc], noiseCache:{}}, r.x0,r.y0,r.w,r.h);
          mp=document.createElement('canvas'); mp.width=reg.w; mp.height=reg.h;
          var mpc=mp.getContext('2d'); var mim=mpc.createImageData(reg.w,reg.h); mim.data.set(reg.out); mpc.putImageData(mim,0,0);
        }
        AlienRig.drawShadow(octx, rig, p);
        AlienRig.draw(octx, rig, body, p, mp);
        var url=off.toDataURL('image/jpeg',0.92);
        var a=document.createElement('a');
        a.href=url; a.download='specimen_'+state.seed+'.jpg';
        document.body.appendChild(a); a.click(); a.remove();
      }catch(e){ console.error(e); }
      busy.style.display='none';
    },30);
  }

  // events ------------------------------------------------------------------
  document.getElementById('gen').addEventListener('click',function(){ state.seed=randSeed(); regen(); });
  document.getElementById('dl').addEventListener('click',download);

  elSeed.addEventListener('change',function(){
    var v=parseInt(elSeed.value.replace(/[^0-9]/g,''),10);
    if(!isFinite(v)) v=0; state.seed=v>>>0; regen();
  });
  elSeed.addEventListener('keydown',function(e){ if(e.key==='Enter') elSeed.blur(); });

  // tempo: speed multiplier 0.17x (sluggish) .. 1.5x (hyperactive), 0.5x at centre
  var elSpeedX=document.getElementById('speed'), elTempo=document.getElementById('tempoLbl');
  var TEMPO_WORDS=['Sluggish','Torpid','Languid','Ambling','Lively','Frisky','Hyperactive'];
  function applyTempo(){
    var v=elSpeedX?parseFloat(elSpeedX.value):0.5; if(isNaN(v)) v=0.5;
    state.speed=0.5*Math.pow(3, 2*v-1);
    if(elTempo) elTempo.textContent='Tempo · '+TEMPO_WORDS[Math.round(v*(TEMPO_WORDS.length-1))];
  }
  if(elSpeedX) elSpeedX.addEventListener('input', applyTempo);
  applyTempo();

  // strangeness: rebuild at draft res while dragging (throttled), full res on release
  var lastDraft=0;
  elStrange.addEventListener('input',function(){
    state.strangeness=parseFloat(elStrange.value);
    var now=performance.now();
    if(now-lastDraft>70){ lastDraft=now; buildScene(DRAG); refreshLabel(); }
  });
  elStrange.addEventListener('change',function(){
    state.strangeness=parseFloat(elStrange.value); regen();
  });

  elPal.addEventListener('change',function(){ state.palette=elPal.value; regen(); });

  var rt;
  window.addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(fitDisplay,120); });
  document.addEventListener('visibilitychange',function(){
    if(document.hidden){ running=false; cancelAnimationFrame(raf); }
    else start();                                  // start() re-anchors lastNow, so the gap is skipped
  });

  regen();
})();
</script>
