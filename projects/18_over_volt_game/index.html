<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>OVERVOLT \u2014 a neon volley duel</title>
<style>
  html,body{margin:0;height:100%;background:#0a0a0f;overflow:hidden;}
  body{display:block;}
  canvas{display:block;width:100vw;height:100vh;background:#0a0a0f;
         image-rendering:auto;touch-action:none;}
  *{-webkit-user-select:none;user-select:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
(function(){
// ============================================================================
// CONFIG  (kept in the original's px-per-step units; one step = 1/60 s)
// ============================================================================
var GW=800, GH=600, PW=15, PH=90, BS=12, POFF=30;
var STEP=1/60;                 // fixed physics timestep (seconds)
var WIN_SCORE=7;               // was 5 in the original; longer for comeback arcs
var BALL_START=7;
var PADDLE_SPEED=8;            // human paddle px/step
var MAX_ANGLE=5*Math.PI/12;    // ~75 deg
var POWER_HITS=3, POWER_MULT=2.0;
var ABS_MAX=28;                // hard ceiling on ball speed (px/step) — power spikes but stays returnable
var FIRST_DELAY=3.0;           // was 6.0; 6s felt tedious
var POINT_DELAY=1.0;           // was 1.5

var COL_BG="#0a0a0f", COL_FIELD="#14141e", COL_ACCENT="#c8c8c8";
var COL_P1="#00ffff", COL_P2="#ff6464", COL_BALL="#ffff00",
    COL_POWER="#ff9600", COL_WIN="#32ff32";

function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function lerp(a,b,t){return a+(b-a)*t;}
function sign(v){return v<0?-1:(v>0?1:0);}
// triangle-wave fold, used for AI ball-landing prediction with wall bounces
function fold(y,lo,hi){var s=hi-lo,p=(((y-lo)%(2*s))+2*s)%(2*s);return lo+(p<s?p:2*s-p);}

// ============================================================================
// PROCEDURAL SOUND (Web Audio) — recreates the pygame SoundSynth beeps
// ============================================================================
function SoundSynth(){this.ctx=null;this.master=null;this.muted=false;}
SoundSynth.prototype.ensure=function(){
  if(!this.ctx){
    var AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    this.ctx=new AC();
    this.master=this.ctx.createGain();
    this.master.gain.value=0.5;
    this.master.connect(this.ctx.destination);
  }
  if(this.ctx.state==="suspended")this.ctx.resume();
};
SoundSynth.prototype.tone=function(freq,dur,type,vol){
  if(this.muted||!this.ctx)return;
  var t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,t);
  g.gain.linearRampToValueAtTime(0.0001,t+dur);   // linear decay like original
  o.connect(g);g.connect(this.master);o.start(t);o.stop(t+dur+0.02);
};
SoundSynth.prototype.noise=function(dur,vol){
  if(this.muted||!this.ctx)return;
  var t=this.ctx.currentTime,n=Math.floor(this.ctx.sampleRate*dur);
  var buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  var s=this.ctx.createBufferSource();s.buffer=buf;
  var g=this.ctx.createGain();g.gain.value=vol;
  s.connect(g);g.connect(this.master);s.start(t);
};
SoundSynth.prototype.paddle=function(){this.tone(440,0.10,"square",0.30);};
SoundSynth.prototype.wall=function(){this.tone(200,0.05,"sine",0.30);};
SoundSynth.prototype.score=function(){this.noise(0.40,0.40);};
SoundSynth.prototype.win=function(){this.tone(500,0.60,"square",0.32);this.tone(760,0.55,"square",0.18);};
SoundSynth.prototype.power=function(){this.tone(880,0.20,"square",0.38);this.tone(440,0.20,"square",0.16);};
SoundSynth.prototype.charge=function(){this.tone(660,0.12,"square",0.22);this.tone(990,0.12,"square",0.12);};
var synth=new SoundSynth();

// ============================================================================
// VISUAL: ripple (ported)
// ============================================================================
function Ripple(x,y,color){this.x=x;this.y=y;this.r=10;this.alpha=200;this.color=color;}
Ripple.prototype.update=function(){this.r+=4;this.alpha-=8;return this.alpha>0;};
Ripple.prototype.draw=function(ctx){
  if(this.alpha<=0)return;
  ctx.save();
  ctx.globalAlpha=Math.max(0,this.alpha/255);
  ctx.strokeStyle=this.color;ctx.lineWidth=4;
  ctx.shadowColor=this.color;ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();
  ctx.restore();
};

// ============================================================================
// PADDLE
// ============================================================================
function Paddle(x,color,isLeft,isAI){
  this.ox=x;this.x=x;this.y=GH/2-PH/2;this.px=this.x;this.py=this.y;
  this.color=color;this.isLeft=isLeft;this.isAI=isAI;
  this.score=0;this.vel=0;this.flash=0;
  this.hitCount=0;this.powerAvail=false;this.powerActive=false;
  this.aiErr=0;this.aiErrTimer=0;this.chargedFlash=0;
}
Paddle.prototype.cy=function(){return this.y+PH/2;};
Paddle.prototype.resetRound=function(){this.powerActive=false;this.x=this.ox;this.chargedFlash=0;};
Paddle.prototype.fullReset=function(){
  this.score=0;this.hitCount=0;this.powerAvail=false;this.powerActive=false;
  this.x=this.ox;this.y=GH/2-PH/2;this.px=this.x;this.py=this.y;this.vel=0;this.flash=0;
};
Paddle.prototype.clampY=function(){
  if(this.y<0){this.y=0;this.vel=0;}
  if(this.y>GH-PH){this.y=GH-PH;this.vel=0;}
};
Paddle.prototype.applyPower=function(held){
  if(this.powerAvail&&held){this.powerActive=true;this.x=this.isLeft?this.ox+POFF:this.ox-POFF;}
  else{this.powerActive=false;this.x=this.ox;}
};
Paddle.prototype.updateHuman=function(keys,upK,downK,powerK){
  this.px=this.x;this.py=this.y;this.vel=0;this.flash*=0.82;this.chargedFlash*=0.93;
  this.applyPower(keys[powerK]);
  if(keys[upK]){this.y-=PADDLE_SPEED;this.vel=-PADDLE_SPEED;}
  if(keys[downK]){this.y+=PADDLE_SPEED;this.vel=PADDLE_SPEED;}
  this.clampY();
};
Paddle.prototype.updateAI=function(ball,game){
  this.px=this.x;this.py=this.y;this.vel=0;this.flash*=0.82;this.chargedFlash*=0.93;
  this.powerActive=false;this.x=this.ox;            // AI never lunges (human-special)
  var skill=game.aiSkill;
  var react=4.5+6.5*skill;                          // px/step ceiling
  var dead=30-25*skill;                             // sloppier deadzone at low skill
  var toward=this.isLeft?(ball.dx<0):(ball.dx>0);
  var target;
  if(toward){
    var plane=this.isLeft?(this.ox+PW):this.ox;
    var predicted=ballPredictY(ball,plane);
    target=ball.cy()+(predicted-ball.cy())*skill;   // chase when dumb, anticipate when smart
    if(this.aiErrTimer>0){this.aiErrTimer--;target+=this.aiErr;}
    else if(Math.random()<0.02*(1-skill)){          // occasional honest mistake
      this.aiErr=(Math.random()*2-1)*70*(1-skill);this.aiErrTimer=18;
    }
  }else{target=GH/2;react*=0.55;}                   // drift back to center, lazily
  var diff=target-this.cy();
  if(Math.abs(diff)>dead){var m=Math.min(react,Math.abs(diff))*sign(diff);this.y+=m;this.vel=m;}
  this.clampY();
};
Paddle.prototype.registerHit=function(){
  if(this.powerActive){this.hitCount=0;this.powerAvail=false;this.powerActive=false;this.x=this.ox;}
  else{
    var was=this.powerAvail;
    this.hitCount++;
    if(this.hitCount>=POWER_HITS){this.powerAvail=true;this.hitCount=POWER_HITS;}
    if(this.powerAvail&&!was){this.chargedFlash=1;synth.charge();}
  }
  this.flash=1;
};

// ============================================================================
// BALL  (sub-stepped continuous collision => no tunneling)
// ============================================================================
function ballPredictY(ball,plane){
  var cx=ball.cx(),cy=ball.cy(),dx=ball.dx,dy=ball.dy;
  if(Math.abs(dx)<0.0001)return cy;
  var t=(plane-cx)/dx;
  if(t<0)return GH/2;
  return fold(cy+dy*t,BS/2,GH-BS/2);
}
function Ball(){this.reset(true);}
Ball.prototype.cx=function(){return this.x+BS/2;};
Ball.prototype.cy=function(){return this.y+BS/2;};
Ball.prototype.reset=function(newGame){
  this.x=GW/2-BS/2;this.y=GH/2-BS/2;this.px=this.x;this.py=this.y;
  this.power=false;this.trail=[];
  var side=Math.random()<0.5?0:Math.PI;
  var ang=side+(Math.random()*2-1)*(Math.PI/4);
  this.speed=BALL_START;
  this.dx=Math.cos(ang)*this.speed;
  this.dy=Math.sin(ang)*this.speed;
  this.enforceLateral();
  this.waiting=true;this.isFirst=!!newGame;
  this.timer=newGame?FIRST_DELAY:POINT_DELAY;
};
Ball.prototype.enforceLateral=function(){
  var sp=Math.hypot(this.dx,this.dy),minx=sp*0.5;
  if(Math.abs(this.dx)<minx){
    this.dx=minx*(this.dx>=0?1:-1);
    var rem=sp*sp-this.dx*this.dx;if(rem<0)rem=0;
    this.dy=Math.sqrt(rem)*(this.dy>=0?1:-1);
  }
};
Ball.prototype.guard=function(dynMax){
  if(!isFinite(this.dx)||!isFinite(this.dy)){      // NaN/inf -> safe serve
    this.dx=BALL_START*(Math.random()<0.5?-1:1);this.dy=0;this.enforceLateral();
  }
  var sp=Math.hypot(this.dx,this.dy);
  if(sp>ABS_MAX){var k=ABS_MAX/sp;this.dx*=k;this.dy*=k;this.speed=Math.min(this.speed,ABS_MAX);}
  this.x=clamp(this.x,-2*BS,GW+2*BS);
  this.y=clamp(this.y,-2*BS,GH+2*BS);
};
// returns 0 / 1 (left scored) / 2 (right scored)
Ball.prototype.update=function(p1,p2,game){
  this.px=this.x;this.py=this.y;
  if(this.waiting){this.timer-=STEP;if(this.timer<=0)this.waiting=false;else return 0;}
  var v=Math.hypot(this.dx,this.dy);
  var N=Math.max(1,Math.ceil(v/4));               // <4px per micro-step < paddle width
  var dynMax=game.dynMax();
  for(var i=0;i<N;i++){
    this.x+=this.dx/N;this.y+=this.dy/N;
    // walls
    if(this.y<=0){this.y=0;this.dy=Math.abs(this.dy);synth.wall();game.shake=Math.max(game.shake,1.5);}
    else if(this.y+BS>=GH){this.y=GH-BS;this.dy=-Math.abs(this.dy);synth.wall();game.shake=Math.max(game.shake,1.5);}
    // goals
    if(this.x<=0)return 2;
    if(this.x+BS>=GW)return 1;
    // paddles (only the one we're moving toward, prevents re-grab after ejection)
    var hit=null,dir=0;
    if(this.dx<0&&this._overlap(p1)){hit=p1;dir=1;}
    else if(this.dx>0&&this._overlap(p2)){hit=p2;dir=-1;}
    if(hit){this._bounce(hit,dir,game,dynMax);this.guard(dynMax);break;}
  }
  this.trail.push({x:this.cx(),y:this.cy()});
  if(this.trail.length>10)this.trail.shift();
  this.guard(dynMax);
  return 0;
};
Ball.prototype._overlap=function(p){
  return this.x<p.x+PW&&this.x+BS>p.x&&this.y<p.y+PH&&this.y+BS>p.y;
};
Ball.prototype._bounce=function(p,dir,game,dynMax){
  if(p.powerActive){synth.power();game.shake=Math.max(game.shake,12);}
  else{synth.paddle();game.shake=Math.max(game.shake,2.2);}
  var cx=(dir===1)?p.x+PW:p.x;
  game.ripples.push(new Ripple(cx,this.cy(),p.color));
  var norm=clamp((p.cy()-this.cy())/(PH/2),-1,1);
  var angle=norm*MAX_ANGLE;
  var friction=p.vel*game.momentum();
  var sp=this.speed;
  if(p.powerActive){sp=Math.min(sp*POWER_MULT,ABS_MAX);this.power=true;game.freeze=3;}
  else{this.power=false;sp=Math.min(sp+0.6,dynMax);}
  p.registerHit();
  this.speed=sp;
  this.dx=sp*Math.cos(angle)*dir;
  this.dy=-sp*Math.sin(angle)+friction;
  this.enforceLateral();
  if(dir===1)this.x=p.x+PW+0.6;else this.x=p.x-BS-0.6;
  if(game.freeze>0){this.px=this.x;this.py=this.y;}  // hold still during hit-stop
  game.onRally();
};

// ============================================================================
// GAME STATE
// ============================================================================
var game={
  state:"menu",            // menu | playing | paused | gameover
  mode:"1p",               // 1p | 2p
  menuSel:1,               // 1 or 2
  rally:0,totalPoints:0,aiSkill:0.32,p1Streak:0,p2Streak:0,
  ripples:[],shake:0,goalFlash:0,goalSide:0,winner:"",
  freeze:0,bestRally:0,scorePop:0,
  p1:null,p2:null,ball:null,
  momentum:function(){return 0.45+0.40*clamp(this.rally/12,0,1);},
  dynMax:function(){
    var m=16+Math.min(this.rally,10)*0.5+Math.min(this.totalPoints,14)*0.2;
    if(this.mode==="1p")m-=clamp(this.p2.score-this.p1.score,0,5)*0.4; // comeback aid
    return clamp(m,14,21);
  },
  onRally:function(){this.rally++;if(this.rally>this.bestRally)this.bestRally=this.rally;},
  onScore:function(scorer){
    this.totalPoints++;
    if(this.mode==="1p"){
      if(scorer===1){this.aiSkill+=0.14;this.p1Streak++;this.p2Streak=0;}
      else{this.aiSkill-=0.10;this.p2Streak++;this.p1Streak=0;}
      this.aiSkill-=(this.p2.score-this.p1.score)*0.015; // margin self-balance
      this.aiSkill=clamp(this.aiSkill,0.12,1.0);
    }
    this.rally=0;
  }
};
function newMatch(mode){
  game.mode=mode;
  game.p1=new Paddle(POFF,COL_P1,true,false);
  game.p2=new Paddle(GW-POFF-PW,COL_P2,false,mode==="1p");
  game.ball=new Ball();
  game.ripples=[];game.shake=0;game.goalFlash=0;game.winner="";
  game.rally=0;game.totalPoints=0;game.aiSkill=0.32;game.p1Streak=0;game.p2Streak=0;
  game.freeze=0;game.bestRally=0;game.scorePop=0;
  game.state="playing";
}
function handleScore(r){
  synth.score();
  game.shake=Math.max(game.shake,6);
  game.scorePop=1;
  game.goalFlash=1;game.goalSide=r;
  if(r===1)game.p1.score++;else game.p2.score++;
  game.onScore(r);
  game.ripples.length=0;game.p1.resetRound();game.p2.resetRound();
  if(game.p1.score>=WIN_SCORE||game.p2.score>=WIN_SCORE){
    game.state="gameover";
    if(game.mode==="1p")game.winner=(r===1)?"YOU WIN":"AI WINS";
    else game.winner=(r===1)?"LEFT WINS":"RIGHT WINS";
    synth.win();
  }else game.ball.reset(false);
}

// ============================================================================
// UPDATE (one fixed step)
// ============================================================================
function decayEffects(){
  // visual transients always decay, regardless of state — otherwise shake/flash
  // would freeze (and persist) the moment we leave the "playing" state.
  game.shake*=0.85;if(game.shake<0.05)game.shake=0;
  game.goalFlash*=0.90;if(game.goalFlash<0.02)game.goalFlash=0;
  game.scorePop*=0.90;if(game.scorePop<0.02)game.scorePop=0;
  for(var i=game.ripples.length-1;i>=0;i--)if(!game.ripples[i].update())game.ripples.splice(i,1);
}
function update(){
  decayEffects();                                   // runs in every state
  if(game.state!=="playing")return;
  if(game.freeze>0){game.freeze--;return;}          // hit-stop: hold the frame on power impact
  var p1=game.p1,p2=game.p2,b=game.ball;
  p1.updateHuman(keys,"w","s","d");
  if(game.mode==="1p")p2.updateAI(b,game);
  else p2.updateHuman(keys,"ArrowUp","ArrowDown","ArrowLeft");
  var r=b.update(p1,p2,game);
  if(r)handleScore(r);
}

// ============================================================================
// RENDER
// ============================================================================
var canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
var DPR=1,scale=1,offX=0,offY=0,cssW=GW,cssH=GH;
function resize(){
  cssW=window.innerWidth;cssH=window.innerHeight;
  DPR=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(cssW*DPR);canvas.height=Math.floor(cssH*DPR);
  canvas.style.width=cssW+"px";canvas.style.height=cssH+"px";
  scale=Math.min(cssW/GW,cssH/GH);
  offX=(cssW-GW*scale)/2;offY=(cssH-GH*scale)/2;
}
window.addEventListener("resize",resize);

function setNeon(color,blur){ctx.shadowColor=color;ctx.shadowBlur=blur;}
function clearNeon(){ctx.shadowBlur=0;ctx.shadowColor="transparent";}

function drawField(){
  ctx.fillStyle=COL_FIELD;ctx.fillRect(0,0,GW,GH);
  // faint grid for depth
  ctx.strokeStyle="rgba(120,140,180,0.05)";ctx.lineWidth=1;
  ctx.beginPath();
  for(var gx=0;gx<=GW;gx+=40){ctx.moveTo(gx,0);ctx.lineTo(gx,GH);}
  for(var gy=0;gy<=GH;gy+=40){ctx.moveTo(0,gy);ctx.lineTo(GW,gy);}
  ctx.stroke();
  // center dashed line
  ctx.setLineDash([10,14]);ctx.strokeStyle=COL_ACCENT;ctx.lineWidth=2;
  ctx.globalAlpha=0.5;
  ctx.beginPath();ctx.moveTo(GW/2,0);ctx.lineTo(GW/2,GH);ctx.stroke();
  ctx.globalAlpha=1;ctx.setLineDash([]);
}
function drawPaddle(p,alpha){
  var x=lerp(p.px,p.x,alpha),y=lerp(p.py,p.y,alpha);
  ctx.save();
  setNeon(p.color,16+p.flash*22);
  ctx.fillStyle=p.color;
  roundRect(x,y,PW,PH,4);ctx.fill();
  if(p.flash>0.02){ctx.globalAlpha=p.flash*0.7;ctx.fillStyle="#ffffff";roundRect(x,y,PW,PH,4);ctx.fill();ctx.globalAlpha=1;}
  clearNeon();
  if(p.powerAvail){                                 // pulsing ready outline
    var pulse=0.5+0.5*Math.sin(performance.now()/120);
    ctx.strokeStyle="#ffffff";ctx.lineWidth=2;ctx.globalAlpha=0.5+0.5*pulse;
    setNeon("#ffffff",10);roundRect(x-2,y-2,PW+4,PH+4,5);ctx.stroke();clearNeon();ctx.globalAlpha=1;
  }
  ctx.restore();
  if(p.chargedFlash>0.04){
    ctx.save();ctx.globalAlpha=clamp(p.chargedFlash,0,1);
    ctx.fillStyle="#ffffff";ctx.font="bold 18px monospace";
    ctx.textAlign=p.isLeft?"left":"right";ctx.textBaseline="middle";
    setNeon("#ffffff",10);
    ctx.fillText("CHARGED",p.isLeft?x:(x+PW),y-16);
    clearNeon();ctx.restore();
  }
  drawChargePips(p,x,y);
}
function drawChargePips(p,x,y){
  var n=p.powerAvail?POWER_HITS:p.hitCount;
  var base=y+PH/2; // interpolated paddle center, matching x
  var px0=p.isLeft?(x+PW+6):(x-6-5);
  for(var k=0;k<POWER_HITS;k++){
    var on=k<n;
    ctx.fillStyle=on?(p.powerAvail?"#ffffff":p.color):"rgba(255,255,255,0.12)";
    if(on&&p.powerAvail){setNeon("#ffffff",8);}else{clearNeon();}
    ctx.fillRect(px0,base-12+k*9,5,6);
  }
  clearNeon();
}
function drawBall(b,alpha){
  var x=lerp(b.px,b.x,alpha),y=lerp(b.py,b.y,alpha);
  var col=b.power?COL_POWER:COL_BALL;
  // trail
  for(var i=0;i<b.trail.length;i++){
    var t=b.trail[i],a=(i+1)/b.trail.length;
    ctx.globalAlpha=a*0.35;ctx.fillStyle=col;
    var rr=(BS/2)*a;
    ctx.beginPath();ctx.arc(t.x,t.y,rr,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  setNeon(col,b.power?26:16);
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(x+BS/2,y+BS/2,BS/2,0,Math.PI*2);ctx.fill();
  clearNeon();
}
function drawHUD(){
  ctx.textAlign="center";ctx.textBaseline="middle";
  var fs=Math.round(58*(1+0.35*game.scorePop));
  ctx.fillStyle=COL_ACCENT;ctx.font="bold "+fs+"px monospace";
  setNeon("#ffffff",6+game.scorePop*14);
  ctx.fillText(game.p1.score+"     "+game.p2.score,GW/2,52);
  clearNeon();
  // live rally counter — rewards the long-rally skill the difficulty curve tracks
  if(game.rally>=3){
    var hot=clamp((game.rally-3)/9,0,1);
    var rc=game.rally>=10?COL_POWER:(game.rally>=6?COL_BALL:COL_ACCENT);
    ctx.font="bold "+(16+hot*10)+"px monospace";ctx.fillStyle=rc;
    setNeon(rc,4+hot*12);
    ctx.fillText("RALLY "+game.rally,GW/2,98);clearNeon();
  }
  // speed-intensity vignette (rising tension)
  var sp=game.ball?Math.hypot(game.ball.dx,game.ball.dy):0;
  var intensity=clamp((sp-13)/14,0,1);
  if(intensity>0){
    var g=ctx.createRadialGradient(GW/2,GH/2,GH*0.35,GW/2,GH/2,GH*0.75);
    g.addColorStop(0,"rgba(255,40,40,0)");
    g.addColorStop(1,"rgba(255,40,40,"+(0.18*intensity).toFixed(3)+")");
    ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
  }
  // goal flash on the conceding side
  if(game.goalFlash>0){
    var gx=(game.goalSide===1)?GW-60:0; // side the ball exited
    var fg=ctx.createLinearGradient(gx,0,gx+(game.goalSide===1?60:60),0);
    var c="rgba(255,255,255,"+(0.35*game.goalFlash).toFixed(3)+")";
    if(game.goalSide===1){fg.addColorStop(0,"rgba(255,255,255,0)");fg.addColorStop(1,c);}
    else{fg.addColorStop(0,c);fg.addColorStop(1,"rgba(255,255,255,0)");}
    ctx.fillStyle=fg;ctx.fillRect(game.goalSide===1?GW-60:0,0,60,GH);
  }
}
function drawServeOverlay(){
  var b=game.ball;if(!b||!b.waiting)return;
  ctx.textAlign="center";ctx.textBaseline="middle";
  if(b.isFirst){
    var n=Math.max(1,Math.ceil(b.timer));
    ctx.fillStyle=COL_ACCENT;ctx.font="bold 160px monospace";
    setNeon("#ffffff",10);ctx.fillText(String(n),GW/2,GH/2-30);clearNeon();
    ctx.fillStyle=COL_BALL;ctx.font="bold 28px monospace";
    ctx.fillText("GET READY",GW/2,GH/2+90);
  }else{
    ctx.globalAlpha=clamp(b.timer/POINT_DELAY,0,1);
    ctx.fillStyle="#9a9a9a";ctx.font="bold 30px monospace";
    ctx.fillText("READY",GW/2,GH/2-50);ctx.globalAlpha=1;
  }
}
function dimField(a){ctx.fillStyle="rgba(8,8,14,"+a+")";ctx.fillRect(0,0,GW,GH);}
function drawMenu(){
  drawField();
  ctx.textAlign="center";ctx.textBaseline="middle";
  setNeon(COL_P1,26);ctx.fillStyle=COL_P1;ctx.font="900 90px monospace";
  ctx.fillText("OVER",GW/2-2,128);
  setNeon(COL_POWER,26);ctx.fillStyle=COL_POWER;
  ctx.fillText("VOLT",GW/2-2,210);clearNeon();
  ctx.fillStyle="#8a8aa0";ctx.font="16px monospace";
  ctx.fillText("a neon volley duel \u2014 first to "+WIN_SCORE+" wins",GW/2,256);
  var opts=[["1","ONE PLAYER  (vs adaptive AI)"],["2","TWO PLAYERS"]];
  for(var i=0;i<2;i++){
    var seld=(game.menuSel===i+1);
    ctx.font="bold 28px monospace";
    ctx.fillStyle=seld?COL_BALL:"#888";
    if(seld)setNeon(COL_BALL,12);else clearNeon();
    ctx.fillText((seld?"\u25B8 ":"   ")+opts[i][1],GW/2,318+i*44);
  }
  clearNeon();
  ctx.fillStyle="#aaa";ctx.font="17px monospace";
  ctx.fillText("\u2191/\u2193 or 1/2 to choose \u2022 ENTER / click to start",GW/2,418);
  ctx.fillStyle=COL_POWER;ctx.font="15px monospace";
  ctx.fillText("Land 3 returns to charge \u2014 hold POWER to overvolt a shot",GW/2,450);
  ctx.fillStyle="#666";ctx.font="15px monospace";
  ctx.fillText("P1: W / S move \u2014 D power      P2: \u2191 / \u2193 move \u2014 \u2190 power",GW/2,498);
  ctx.fillText("P pause \u2022 M mute \u2022 ESC menu      \u2022      best on desktop / keyboard",GW/2,524);
}
function drawPauseOverlay(){
  dimField(0.55);
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle=COL_BALL;ctx.font="bold 54px monospace";setNeon(COL_BALL,12);
  ctx.fillText("PAUSED",GW/2,GH/2-20);clearNeon();
  ctx.fillStyle="#aaa";ctx.font="20px monospace";
  ctx.fillText("P / ESC to resume",GW/2,GH/2+40);
}
function drawGameOver(){
  dimField(0.6);
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillStyle=COL_WIN;ctx.font="bold 64px monospace";setNeon(COL_WIN,16);
  ctx.fillText(game.winner,GW/2,GH/2-40);clearNeon();
  ctx.fillStyle=COL_ACCENT;ctx.font="bold 40px monospace";
  ctx.fillText(game.p1.score+"  -  "+game.p2.score,GW/2,GH/2+20);
  ctx.fillStyle=COL_BALL;ctx.font="16px monospace";
  ctx.fillText("LONGEST RALLY: "+game.bestRally,GW/2,GH/2+55);
  ctx.fillStyle="#aaa";ctx.font="20px monospace";
  ctx.fillText("SPACE to rematch \u2022 ESC for menu",GW/2,GH/2+92);
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function render(alpha){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle=COL_BG;ctx.fillRect(0,0,cssW,cssH); // letterbox bars
  ctx.save();
  ctx.translate(offX,offY);ctx.scale(scale,scale);
  if(game.shake>0){var s=game.shake;ctx.translate((Math.random()*2-1)*s,(Math.random()*2-1)*s);}
  ctx.beginPath();ctx.rect(0,0,GW,GH);ctx.clip();   // keep glow/shake inside field
  if(game.state==="menu"){drawMenu();ctx.restore();return;}
  drawField();
  for(var i=0;i<game.ripples.length;i++)game.ripples[i].draw(ctx);
  drawPaddle(game.p1,alpha);drawPaddle(game.p2,alpha);
  if(game.state!=="gameover")drawBall(game.ball,alpha);
  drawHUD();
  if(game.state==="playing")drawServeOverlay();
  if(game.state==="paused")drawPauseOverlay();
  if(game.state==="gameover")drawGameOver();
  ctx.restore();
}

// ============================================================================
// MAIN LOOP — fixed-timestep accumulator (identical physics at any refresh)
// ============================================================================
var acc=0,last=performance.now();
function frame(now){
  var dt=(now-last)/1000;last=now;
  if(dt>0.25)dt=0.25;            // anti spiral-of-death
  acc+=dt;
  var guardSteps=0;
  while(acc>=STEP&&guardSteps<8){update();acc-=STEP;guardSteps++;}
  if(guardSteps>=8)acc=0;
  // interpolate only during live play; freezing/pausing/menus render the exact state
  var alpha=(game.state==="playing"&&game.freeze===0)?(acc/STEP):1;
  render(alpha);
  requestAnimationFrame(frame);
}

// ============================================================================
// INPUT
// ============================================================================
var keys={};
function startGesture(){synth.ensure();}
window.addEventListener("keydown",function(e){
  var k=e.key;
  if(k===" "||k==="ArrowUp"||k==="ArrowDown"||k==="ArrowLeft"||k==="ArrowRight")e.preventDefault();
  startGesture();
  // normalize single chars to lowercase for movement keys
  var lk=(k.length===1)?k.toLowerCase():k;
  var wasDown=!!keys[lk];
  keys[lk]=true;
  if(wasDown)return;                                 // ignore OS key-repeat for discrete actions

  if(game.state==="menu"){
    if(k==="ArrowUp"||k==="ArrowDown"||lk==="w"||lk==="s")game.menuSel=game.menuSel===1?2:1;
    else if(lk==="1"){game.menuSel=1;newMatch("1p");}
    else if(lk==="2"){game.menuSel=2;newMatch("2p");}
    else if(k==="Enter"||k===" ")newMatch(game.menuSel===1?"1p":"2p");
  }else if(game.state==="playing"){
    if(lk==="p"||k==="Escape")game.state="paused";
    else if(lk==="m"){synth.muted=!synth.muted;}
  }else if(game.state==="paused"){
    if(lk==="p"||k==="Escape")game.state="playing";
    else if(lk==="m"){synth.muted=!synth.muted;}
  }else if(game.state==="gameover"){
    if(k===" "||k==="Enter")newMatch(game.mode);
    else if(k==="Escape"){game.state="menu";game.shake=0;game.goalFlash=0;game.scorePop=0;game.freeze=0;keys={};}
  }
},{passive:false});
window.addEventListener("keyup",function(e){
  var k=e.key,lk=(k.length===1)?k.toLowerCase():k;
  delete keys[lk];
});
window.addEventListener("blur",function(){keys={};if(game.state==="playing")game.state="paused";});
canvas.addEventListener("pointerdown",function(){
  startGesture();
  if(game.state==="menu")newMatch(game.menuSel===1?"1p":"2p");
  else if(game.state==="gameover")newMatch(game.mode);
});

resize();
requestAnimationFrame(frame);
})();
</script>
