<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Procedural Shader Gallery</title>
<style>
  :root {
    --ink: #e8e8ea;
    --dim: #8a8a93;
    --line: rgba(255,255,255,0.14);
    --panel: rgba(12,12,16,0.42);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  #gl { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  /* --- overlay chrome: kept quiet; the shader is the hero --- */
  .hud {
    position: fixed; inset: 0; pointer-events: none;
    color: var(--ink); font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
  }
  .hud .top {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 20px;
  }
  .title {
    font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--dim); font-weight: 500;
  }
  .index {
    font-size: 11px; letter-spacing: 0.2em; color: var(--dim);
    font-variant-numeric: tabular-nums;
  }

  .deck {
    position: absolute; left: 20px; bottom: 22px;
    display: flex; align-items: center; gap: 14px;
    pointer-events: auto;
  }
  .nav {
    pointer-events: auto;
    appearance: none; -webkit-appearance: none;
    width: 40px; height: 40px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--panel);
    color: var(--ink); font-size: 16px; line-height: 1;
    cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    transition: border-color .15s ease, transform .08s ease, background .15s ease;
  }
  .nav:hover { border-color: rgba(255,255,255,0.4); background: rgba(20,20,26,0.6); }
  .nav:active { transform: scale(0.92); }
  .nav:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  .label { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .name {
    font-size: 17px; font-weight: 600; letter-spacing: 0.01em;
    text-shadow: 0 1px 14px rgba(0,0,0,0.65);
    transition: opacity .18s ease;
  }
  .kind {
    font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--dim);
  }

  .hint {
    position: absolute; right: 20px; bottom: 28px;
    font-size: 11px; letter-spacing: 0.04em; color: var(--dim);
    text-align: right; max-width: 50vw;
  }
  .hint b { color: var(--ink); font-weight: 600; }

  @media (max-width: 560px) {
    .hint { display: none; }
    .name { font-size: 15px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .nav { transition: none; }
  }

  #fallback {
    position: fixed; inset: 0; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: #0a0a0e; color: #e8e8ea; font-family: var(--mono);
    text-align: center; line-height: 1.6; font-size: 14px;
  }
  #fallback.show { display: flex; }
  #fallback .box { max-width: 460px; }
  #fallback .big { font-size: 18px; margin-bottom: 10px; letter-spacing: 0.02em; }
  #fallback .sub { color: var(--dim); }
</style>
</head>
<body>
  <canvas id="gl"></canvas>

  <div class="hud" aria-hidden="false">
    <div class="top">
      <div class="title">Procedural Shader Gallery</div>
      <div class="index" id="indexLabel">01 / 04</div>
    </div>

    <div class="deck">
      <button class="nav" id="prev" aria-label="Previous shader" title="Previous (←)">&#8592;</button>
      <button class="nav" id="next" aria-label="Next shader" title="Next (→)">&#8594;</button>
      <div class="label">
        <div class="name" id="nameLabel">&mdash;</div>
        <div class="kind" id="kindLabel">&mdash;</div>
      </div>
    </div>

    <div class="hint">
      Move the mouse to steer &middot; <b>&larr; &rarr;</b> or buttons to switch
    </div>
  </div>

  <div id="fallback">
    <div class="box">
      <div class="big">Can&rsquo;t start the gallery</div>
      <div class="sub" id="fallbackMsg">This page needs WebGL.</div>
    </div>
  </div>

  <!-- Three.js r128, classic global script (no modules) -->
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script>
  (function () {
    "use strict";

    var fallback = document.getElementById("fallback");
    var fallbackMsg = document.getElementById("fallbackMsg");

    function fail(msg) {
      fallbackMsg.textContent = msg;
      fallback.classList.add("show");
    }

    // --- Guard: did the CDN script load? (file:// still needs internet for this one fetch) ---
    if (typeof THREE === "undefined") {
      fail("Three.js failed to load. The page needs an internet connection the first time so it can fetch Three.js r128 from unpkg.");
      return;
    }

    // --- Guard: is WebGL actually available? ---
    function webglOK() {
      try {
        var c = document.createElement("canvas");
        return !!(window.WebGLRenderingContext &&
          (c.getContext("webgl") || c.getContext("experimental-webgl")));
      } catch (e) { return false; }
    }
    if (!webglOK()) {
      fail("WebGL isn't available in this browser. Try a recent Chrome, Firefox, Safari, or Edge.");
      return;
    }

    // ---------------------------------------------------------------
    // Shared vertex shader: draw the geometry straight into clip space.
    // PlaneGeometry(2,2) has xy in [-1,1], so this fills the viewport
    // with no camera transform needed.
    // ---------------------------------------------------------------
    var VERT = [
      "void main() {",
      "  gl_Position = vec4(position.xy, 0.0, 1.0);",
      "}"
    ].join("\n");

    // Common header every fragment shader gets (required uniforms).
    var HEADER = [
      "precision mediump float;",
      "uniform float u_time;",
      "uniform vec2  u_resolution;",
      "uniform vec2  u_mouse;"
    ].join("\n");

    // Reusable noise/fbm blocks (inlined per-shader so each is self-contained).
    var NOISE = [
      "float hash21(vec2 p){",
      "  p = fract(p * vec2(123.34, 456.21));",
      "  p += dot(p, p + 45.32);",
      "  return fract(p.x * p.y);",
      "}",
      "float vnoise(vec2 p){",
      "  vec2 i = floor(p); vec2 f = fract(p);",
      "  vec2 u = f * f * (3.0 - 2.0 * f);",
      "  float a = hash21(i);",
      "  float b = hash21(i + vec2(1.0, 0.0));",
      "  float c = hash21(i + vec2(0.0, 1.0));",
      "  float d = hash21(i + vec2(1.0, 1.0));",
      "  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);",
      "}"
    ].join("\n");

    function fbm(octaves) {
      return [
        "float fbm(vec2 p){",
        "  float v = 0.0; float a = 0.5;",
        "  mat2 rot = mat2(0.8, -0.6, 0.6, 0.8);",
        "  for(int i = 0; i < " + octaves + "; i++){",
        "    v += a * vnoise(p);",
        "    p = rot * p * 2.0;",
        "    a *= 0.5;",
        "  }",
        "  return v;",
        "}"
      ].join("\n");
    }

    // ===============================================================
    // 1. PLASMA  — flowing value-noise fbm, mouse offsets the field
    // ===============================================================
    var PLASMA = [
      HEADER, NOISE, fbm(5),
      "void main(){",
      "  vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;",
      "  vec2 m = (u_mouse - 0.5) * 2.0;",
      "  p += m * 0.6;",
      "  float t = u_time * 0.18;",
      "  float warp = fbm(p * 1.4 + t);",
      "  float n = fbm(p * 2.2 + vec2(t, -t) + warp * 1.6);",
      "  vec3 col = 0.5 + 0.5 * cos(6.2831 * (n + vec3(0.0, 0.33, 0.67)) + t * 1.3);",
      "  col *= 0.85 + 0.4 * n;",
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    // ===============================================================
    // 2. JULIA  — animated Julia set, mouse nudges the c parameter
    //    (mediump caps usable zoom depth; kept modest on purpose)
    // ===============================================================
    var JULIA = [
      HEADER,
      "void main(){",
      "  vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;",
      "  p *= 1.4;",
      "  vec2 m = (u_mouse - 0.5);",
      "  vec2 c = vec2(0.355 + 0.12 * cos(u_time * 0.30),",
      "                0.355 + 0.12 * sin(u_time * 0.27));",
      "  c += m * 0.45;",
      "  vec2 z = p;",
      "  float it = 0.0;",
      "  const int MAX = 64;",
      "  for(int i = 0; i < MAX; i++){",
      "    z = vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;",
      "    if(dot(z, z) > 4.0) break;",
      "    it += 1.0;",
      "  }",
      "  float f = it / float(MAX);",
      "  vec3 col = 0.5 + 0.5 * cos(6.2831 * (f * 2.5 + vec3(0.0, 0.4, 0.75)) + u_time * 0.25);",
      "  col *= smoothstep(0.0, 0.12, f);",        // darken the interior set
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    // ===============================================================
    // 3. FLUID  — IQ-style domain warping (fbm of fbm), mouse warps
    // ===============================================================
    var FLUID = [
      HEADER, NOISE, fbm(4),
      "void main(){",
      "  vec2 p = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;",
      "  vec2 m = (u_mouse - 0.5) * 2.0;",
      "  float t = u_time * 0.12;",
      "  vec2 q = vec2(fbm(p + t), fbm(p + vec2(5.2, 1.3) - t));",
      "  vec2 r = vec2(fbm(p + 3.5 * q + vec2(1.7, 9.2) + m * 0.8 + t),",
      "                fbm(p + 3.5 * q + vec2(8.3, 2.8) - t));",
      "  float f = fbm(p + 4.0 * r);",
      "  vec3 col = mix(vec3(0.06, 0.12, 0.34), vec3(0.95, 0.62, 0.18), clamp(f * f, 0.0, 1.0));",
      "  col = mix(col, vec3(0.0, 0.02, 0.10), clamp(dot(q, q), 0.0, 1.0));",
      "  col = mix(col, vec3(1.0, 0.93, 0.82), clamp(0.6 * r.x, 0.0, 1.0));",
      "  gl_FragColor = vec4(col * 1.08, 1.0);",
      "}"
    ].join("\n");

    // ===============================================================
    // 4. LIGHT FIELD  — raymarched SDF blobs, mouse orbits the camera
    //    Epsilons sized for mediump so normals don't shatter on mobile.
    // ===============================================================
    var RAYMARCH = [
      HEADER,
      "float sdSphere(vec3 p, float r){ return length(p) - r; }",
      "float smin(float a, float b, float k){",
      "  float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);",
      "  return mix(b, a, h) - k * h * (1.0 - h);",
      "}",
      "float map(vec3 p){",
      "  float t = u_time * 0.6;",
      "  float d = sdSphere(p - vec3(sin(t) * 1.3, 0.0, 0.0), 0.85);",
      "  d = smin(d, sdSphere(p - vec3(-sin(t) * 1.3, cos(t * 0.7) * 0.7, 0.0), 0.7), 0.7);",
      "  d = smin(d, sdSphere(p - vec3(0.0, sin(t * 1.3) * 0.9, cos(t) * 1.1), 0.6), 0.7);",
      "  return d;",
      "}",
      "vec3 calcNormal(vec3 p){",
      "  vec2 e = vec2(0.02, 0.0);",   // generous epsilon: mediump-safe
      "  return normalize(vec3(",
      "    map(p + e.xyy) - map(p - e.xyy),",
      "    map(p + e.yxy) - map(p - e.yxy),",
      "    map(p + e.yyx) - map(p - e.yyx)));",
      "}",
      "void main(){",
      "  vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / u_resolution.y;",
      "  vec2 m = (u_mouse - 0.5) * 2.0;",
      "  float ang = m.x * 3.14159 + 0.4;",
      "  vec3 ro = vec3(sin(ang) * 4.2, 1.0 + m.y * 1.8, cos(ang) * 4.2);",
      "  vec3 ta = vec3(0.0);",
      "  vec3 ww = normalize(ta - ro);",
      "  vec3 uu = normalize(cross(ww, vec3(0.0, 1.0, 0.0)));",
      "  vec3 vv = cross(uu, ww);",
      "  vec3 rd = normalize(uv.x * uu + uv.y * vv + 1.6 * ww);",
      "  float td = 0.0; bool hit = false;",
      "  const int STEPS = 64;",
      "  for(int i = 0; i < STEPS; i++){",
      "    vec3 pos = ro + rd * td;",
      "    float d = map(pos);",
      "    if(d < 0.01){ hit = true; break; }",   // mediump-safe hit threshold
      "    td += d;",
      "    if(td > 18.0) break;",
      "  }",
      "  vec3 col = mix(vec3(0.02, 0.03, 0.07), vec3(0.05, 0.06, 0.12), uv.y * 0.5 + 0.5);",
      "  if(hit){",
      "    vec3 pos = ro + rd * td;",
      "    vec3 n = calcNormal(pos);",
      "    vec3 lp = vec3(2.5, 3.5, 2.0);",
      "    vec3 l = normalize(lp - pos);",
      "    float diff = max(dot(n, l), 0.0);",
      "    float spec = pow(max(dot(reflect(-l, n), -rd), 0.0), 28.0);",
      "    float fres = pow(1.0 - max(dot(n, -rd), 0.0), 3.0);",
      "    vec3 base = 0.5 + 0.5 * cos(vec3(0.0, 2.0, 4.0) + pos.y * 1.2 + u_time * 0.3);",
      "    col = base * (0.18 + 0.9 * diff) + spec * 0.7 + fres * vec3(0.3, 0.5, 0.9);",
      "  }",
      "  col = pow(col, vec3(0.4545));",   // gamma
      "  gl_FragColor = vec4(col, 1.0);",
      "}"
    ].join("\n");

    var SHADERS = [
      { name: "Plasma Flow",   kind: "Value-noise fbm", frag: PLASMA },
      { name: "Julia Drift",   kind: "Animated fractal", frag: JULIA },
      { name: "Domain Warp",   kind: "Fluid color field", frag: FLUID },
      { name: "Soft Bodies",   kind: "Raymarched SDF",   frag: RAYMARCH }
    ];

    // ---------------------------------------------------------------
    // Renderer / scene / fullscreen quad
    // ---------------------------------------------------------------
    var canvas = document.getElementById("gl");
    var renderer;
    try {
      renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: false, alpha: false });
    } catch (e) {
      fail("Couldn't create a WebGL context: " + e.message);
      return;
    }
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    var scene = new THREE.Scene();
    var camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    var uniforms = {
      u_time:       { value: 0.0 },
      u_resolution: { value: new THREE.Vector2(1, 1) },
      u_mouse:      { value: new THREE.Vector2(0.5, 0.5) }
    };

    var geometry = new THREE.PlaneGeometry(2, 2);
    var material = new THREE.ShaderMaterial({
      uniforms: uniforms,
      vertexShader: VERT,
      fragmentShader: SHADERS[0].frag
    });
    var quad = new THREE.Mesh(geometry, material);
    quad.frustumCulled = false; // clip-space vertex shader => never cull
    scene.add(quad);

    // ---------------------------------------------------------------
    // Shader switching (recompile the program, keep shared uniforms)
    // ---------------------------------------------------------------
    var current = 0;
    var nameLabel = document.getElementById("nameLabel");
    var kindLabel = document.getElementById("kindLabel");
    var indexLabel = document.getElementById("indexLabel");

    function pad2(n) { return (n < 10 ? "0" : "") + n; }

    function setShader(i) {
      current = (i + SHADERS.length) % SHADERS.length;
      var s = SHADERS[current];
      material.fragmentShader = s.frag;
      material.needsUpdate = true; // forces a recompile in r128
      nameLabel.textContent = s.name;
      kindLabel.textContent = s.kind;
      indexLabel.textContent = pad2(current + 1) + " / " + pad2(SHADERS.length);
    }
    setShader(0);

    document.getElementById("next").addEventListener("click", function () { setShader(current + 1); });
    document.getElementById("prev").addEventListener("click", function () { setShader(current - 1); });
    window.addEventListener("keydown", function (e) {
      if (e.key === "ArrowRight") setShader(current + 1);
      else if (e.key === "ArrowLeft") setShader(current - 1);
    });

    // ---------------------------------------------------------------
    // Input: pointer (covers mouse + touch), normalized 0..1, y up
    // ---------------------------------------------------------------
    function onPointer(e) {
      var x = (e.touches ? e.touches[0].clientX : e.clientX);
      var y = (e.touches ? e.touches[0].clientY : e.clientY);
      uniforms.u_mouse.value.x = x / window.innerWidth;
      uniforms.u_mouse.value.y = 1.0 - y / window.innerHeight;
    }
    window.addEventListener("pointermove", onPointer, { passive: true });
    window.addEventListener("touchmove", onPointer, { passive: true });

    // ---------------------------------------------------------------
    // Resize: size, pixel ratio, and the resolution uniform (in
    // device pixels, matching gl_FragCoord)
    // ---------------------------------------------------------------
    function resize() {
      var w = window.innerWidth, h = window.innerHeight;
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(w, h, false);
      var pr = renderer.getPixelRatio();
      uniforms.u_resolution.value.set(w * pr, h * pr);
    }
    window.addEventListener("resize", resize);
    resize();

    // ---------------------------------------------------------------
    // Loop
    // ---------------------------------------------------------------
    var start = performance.now();
    function tick(now) {
      uniforms.u_time.value = (now - start) / 1000.0;
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // Surface shader compile errors instead of failing silently to black.
    var origError = console.error;
    console.error = function () {
      var msg = Array.prototype.join.call(arguments, " ");
      if (/shader|GLSL|compile|program/i.test(msg) && !fallback.classList.contains("show")) {
        fail("A shader failed to compile. Open the console for the GLSL error log.");
      }
      origError.apply(console, arguments);
    };
  })();
  </script>
</body>
</html>
