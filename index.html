<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Web Experiments</title>
  <meta name="description" content="A gallery of interactive WebGL experiments by Joe Meiser." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" />

  <style>
    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --ink: #1a1a1a;
      --ink-muted: #6b6b6b;
      --ink-faint: #9a9a9a;
      --rule: #ececea;
      --placeholder: #ededea;
      --shadow-rest: 0 1px 2px rgba(20, 20, 20, 0.04);
      --shadow-hover: 0 12px 28px rgba(20, 20, 20, 0.10), 0 2px 6px rgba(20, 20, 20, 0.05);
      --radius: 6px;
      --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      width: 100%;
      max-width: 1180px;
      margin: 0 auto;
      padding: 64px 48px 48px;
      flex: 1 0 auto;
      display: flex;
      flex-direction: column;
    }

    header.site-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 56px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--rule);
    }

    .site-title {
      font-weight: 500;
      font-size: clamp(20px, 2.2vw, 26px);
      letter-spacing: -0.015em;
      color: var(--ink);
      margin: 0;
    }

    .site-note {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--ink-faint);
      text-transform: uppercase;
      white-space: nowrap;
    }

    main { flex: 1 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 36px 32px;
    }

    .tile {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }

    .tile-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow-rest);
      transition: transform 280ms var(--ease),
                  box-shadow 280ms var(--ease);
    }

    .tile-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 320ms var(--ease);
    }

    .tile-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: var(--placeholder);
      color: var(--ink-muted);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.005em;
      text-align: center;
    }

    .tile-title {
      font-weight: 500;
      font-size: 15px;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin: 0;
    }

    .tile:hover .tile-frame,
    .tile:focus-visible .tile-frame {
      transform: translateY(-2px) scale(1.02);
      box-shadow: var(--shadow-hover);
    }

    .tile:focus-visible .tile-frame {
      outline: 2px solid var(--ink);
      outline-offset: 4px;
    }

    @media (prefers-reduced-motion: reduce) {
      .tile-frame, .tile-frame img { transition: none; }
      .tile:hover .tile-frame, .tile:focus-visible .tile-frame { transform: none; }
    }

    footer.site-footer {
      flex-shrink: 0;
      padding: 48px 48px 40px;
      text-align: center;
    }

    .site-footer p {
      margin: 0;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--ink-faint);
    }

    @media (max-width: 900px) {
      .page { padding: 48px 32px 32px; }
      header.site-header { margin-bottom: 40px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 28px 24px; }
    }

    @media (max-width: 560px) {
      .page { padding: 36px 20px 20px; }
      header.site-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 32px;
      }
      .grid { grid-template-columns: 1fr; gap: 28px; }
      footer.site-footer { padding: 32px 20px 28px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="site-header">
      <h1 class="site-title">Interactive Web Experiments</h1>
      <span class="site-note">Best viewed on desktop</span>
    </header>

    <main>
      <div class="grid" id="grid" role="list"></div>
    </main>
  </div>

  <footer class="site-footer">
    <p>All web experiments created by Joe Meiser.</p>
  </footer>

  <script src="projects.js"></script>
  <script>
    (function () {
      var grid = document.getElementById("grid");
      if (!grid || typeof PROJECTS === "undefined" || !Array.isArray(PROJECTS)) return;

      var frag = document.createDocumentFragment();

      PROJECTS.forEach(function (p) {
        var a = document.createElement("a");
        a.className = "tile";
        a.href = "projects/" + p.folder + "/index.html";
        a.target = "_blank";
        a.rel = "noopener";
        a.setAttribute("role", "listitem");
        a.setAttribute("aria-label", p.title);

        var frame = document.createElement("div");
        frame.className = "tile-frame";

        if (p.thumb) {
          var img = document.createElement("img");
          img.src = "projects/" + p.folder + "/" + p.thumb;
          img.alt = p.title;
          img.loading = "lazy";
          img.decoding = "async";
          frame.appendChild(img);
        } else {
          var ph = document.createElement("div");
          ph.className = "tile-placeholder";
          ph.textContent = p.title;
          frame.appendChild(ph);
        }

        var title = document.createElement("p");
        title.className = "tile-title";
        title.textContent = p.title;

        a.appendChild(frame);
        a.appendChild(title);
        frag.appendChild(a);
      });

      grid.appendChild(frag);
    })();
  </script>
</body>
</html>
